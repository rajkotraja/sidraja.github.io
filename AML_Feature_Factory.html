Feature Block: Round Amount Detection
Axis: TRANSACTION | RT#24
"""
import pandas as pd
import numpy as np

def compute_features(datasets):
    txn = datasets.get('transactions')
    result = txn[['transaction_id']].copy()
    amt = txn['amount']
    
    result['f_txn_round_amount_flag'] = (
        (amt % 10000 == 0) | (amt % 5000 == 0) | (amt % 1000 == 0)

function App() {

  const [blocks, setBlocks] = useState(FEATURE_BLOCKS);

  const [toast, setToast] = useState(null);
  const [loadingData, setLoadingData] = useState(false);

  const showToast = useCallback((msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  }, []);

  const loadSampleData = useCallback(() => {
    setLoadingData(true);
    setTimeout(() => {
      setDataLoaded(true);
      setLoadingData(false);
      showToast("Sample AML data loaded — 3 datasets, 5,700 records");
    }, 1800);
  }, [showToast]);

  const executeAll = useCallback(() => {
    setExecutionState({ running: true, current: 0, total: blocks.filter(b => b.status === "ACTIVE").length, log: [] });
    const activeBlocks = blocks.filter(b => b.status === "ACTIVE");
    let idx = 0;
    const interval = setInterval(() => {
      if (idx >= activeBlocks.length) {
        clearInterval(interval);
        setExecutionState(prev => ({ ...prev, running: false, log: [...prev.log, { ts: new Date().toISOString(), msg: `✅ Pipeline complete — ${activeBlocks.length} blocks, ${activeBlocks.reduce((s, b) => s + b.outputs.length, 0)} features computed`, type: "success" }] }));
        showToast(`Pipeline executed — ${activeBlocks.length} blocks, all passed`);
        return;
      }
      const b = activeBlocks[idx];
      setExecutionState(prev => ({
        ...prev,
        current: idx + 1,
        log: [...prev.log, { ts: new Date().toISOString(), msg: `▶ Executing: ${b.name} (${b.axis}) — ${b.outputs.length} features — ${b.lastExecMs}ms`, type: "info" }]
      }));
      idx++;
    }, 600);
  }, [blocks, showToast]);

    { id: "data", icon: "database", label: "Data Ingestion" },

            </button>
          ))}
        </nav>
        <button onClick={() => setSidebarOpen(!sidebarOpen)} style={{ margin: "8px", padding: 8, background: "none", border: "1px solid #1e293b", borderRadius: 8, color: "#64748b", cursor: "pointer", display: "flex", justifyContent: "center" }}>

// ─── JSON TREE VIEW ────────────────────────────────────────────────────
function JsonTreeView({ data, depth = 0 }) {
  const [collapsed, setCollapsed] = useState({});
  const toggle = (key) => setCollapsed(p => ({ ...p, [key]: !p[key] }));

  if (typeof data !== "object" || data === null) {
    const color = typeof data === "number" ? (data > 0.7 ? "#ef4444" : data > 0.4 ? "#f59e0b" : "#93c5fd") : typeof data === "string" ? "#a5d6ff" : "#c4b5fd";
    return <span style={{ color }}>{typeof data === "string" ? `"${data}"` : String(data)}</span>;
  }
  const entries = Object.entries(data);
  const indent = depth * 20;
  return (
    <span>
      {"{\n"}
      {entries.map(([key, val], i) => (
        <span key={key}>
          <span style={{ paddingLeft: indent + 20, display: "inline-block" }}>
            {typeof val === "object" && val !== null ? (
              <span onClick={() => toggle(key)} style={{ cursor: "pointer" }}>
                <span style={{ color: "#f1f5f9" }}>"{key}"</span>
                <span style={{ color: "#64748b" }}>: </span>
                {collapsed[key] ? <span style={{ color: "#475569" }}>{"{ ... }"}</span> : <JsonTreeView data={val} depth={depth + 1} />}
              </span>
            ) : (
              <span><span style={{ color: "#f1f5f9" }}>"{key}"</span><span style={{ color: "#64748b" }}>: </span><JsonTreeView data={val} depth={depth + 1} /></span>
            )}
            {i < entries.length - 1 && <span style={{ color: "#475569" }}>,</span>}
          </span>
          {"\n"}
        </span>
      ))}
      <span style={{ paddingLeft: indent, display: "inline-block" }}>{"}"}</span>
    </span>
  );
}

// ─── AI CODE TEMPLATES (prompt-specific) ───────────────────────────────
const AI_CODE_TEMPLATES = {
  "Detect structuring — transactions just below 10,000 threshold": `"""
Feature Block: Structuring Detection
Description: Detects patterns of transactions just below the
  10,000 reporting threshold within rolling windows per account.
Axis: ACCOUNT | Risk Typology: RT#26
Output: f_acc_structuring_count_7d, f_acc_structuring_total_7d,
        f_acc_structuring_score, f_acc_structuring_flag
"""
import pandas as pd
import numpy as np

def compute_features(datasets):
    txn = datasets.get('transactions')
    accounts = datasets.get('accounts')
    
    THRESHOLD = 10000
    LOWER_BOUND = 7500  # 75% of threshold
    WINDOW_DAYS = 7
    
    result = accounts[['account_id']].copy()
    
    # Identify sub-threshold transactions
    txn['transaction_date'] = pd.to_datetime(txn['transaction_date'])
    sub_thresh = txn[
        (txn['amount'] >= LOWER_BOUND) & 
        (txn['amount'] < THRESHOLD)
    ].copy()
    
    # Count sub-threshold hits per account in window
    cutoff = txn['transaction_date'].max() - pd.Timedelta(days=WINDOW_DAYS)
    recent = sub_thresh[sub_thresh['transaction_date'] >= cutoff]
    
    agg = recent.groupby('account_id').agg(
        count=('amount', 'count'),
        total=('amount', 'sum')
    ).reset_index()
    
    result = result.merge(agg, on='account_id', how='left')
    result['f_acc_structuring_count_7d'] = result['count'].fillna(0).astype(int)
    result['f_acc_structuring_total_7d'] = result['total'].fillna(0.0).round(2)
    
    # Score: higher if more hits and total approaches N * threshold
    max_count = max(result['f_acc_structuring_count_7d'].max(), 1)
    result['f_acc_structuring_score'] = np.clip(
        (result['f_acc_structuring_count_7d'] / max_count) * 0.5 +
        (result['f_acc_structuring_total_7d'] / (THRESHOLD * 5)) * 0.5,
        0, 1
    ).round(3)
    
    result['f_acc_structuring_flag'] = (
        result['f_acc_structuring_count_7d'] >= 3
    ).astype(int)
    
    result = result.drop(columns=['count','total'], errors='ignore')
    return result`,

  "Flag rapid fund movement patterns (deposit → withdrawal < 24h)": `"""
Feature Block: Rapid Fund Movement Detection
Description: Flags accounts where deposits are quickly followed
  by withdrawals within 24 hours — classic layering indicator.
Axis: ACCOUNT | Risk Typology: RT#25
Output: f_acc_rapid_pairs_30d, f_acc_rapid_total_volume,
        f_acc_rapid_movement_score, f_acc_flow_through_ratio
"""
import pandas as pd
import numpy as np

def compute_features(datasets):
    txn = datasets.get('transactions')
    accounts = datasets.get('accounts')
    
    HOURS_THRESHOLD = 24
    LOOKBACK_DAYS = 30
    
    result = accounts[['account_id']].copy()
    
    txn['transaction_date'] = pd.to_datetime(txn['transaction_date'])
    cutoff = txn['transaction_date'].max() - pd.Timedelta(days=LOOKBACK_DAYS)
    recent = txn[txn['transaction_date'] >= cutoff].copy()
    
    INFLOW_TYPES = ['WIRE_IN', 'CASH_DEPOSIT', 'CHECK_DEPOSIT']
    OUTFLOW_TYPES = ['WIRE_OUT', 'CASH_WITHDRAWAL', 'INTERNAL_TRANSFER']
    
    rapid_pairs = []
    for acc_id, grp in recent.groupby('account_id'):
        inflows = grp[grp['transaction_type'].isin(INFLOW_TYPES)].sort_values('transaction_date')
        outflows = grp[grp['transaction_type'].isin(OUTFLOW_TYPES)].sort_values('transaction_date')
        
        pair_count = 0
        pair_volume = 0.0
        for _, inf in inflows.iterrows():
            matching = outflows[
                (outflows['transaction_date'] >= inf['transaction_date']) &
                (outflows['transaction_date'] <= inf['transaction_date'] + pd.Timedelta(hours=HOURS_THRESHOLD))
            ]
            pair_count += len(matching)
            pair_volume += matching['amount'].sum()
        
        total_in = grp[grp['transaction_type'].isin(INFLOW_TYPES)]['amount'].sum()
        total_out = grp[grp['transaction_type'].isin(OUTFLOW_TYPES)]['amount'].sum()
        flow_ratio = min(total_out / max(total_in, 1), 1.0)
        
        rapid_pairs.append({
            'account_id': acc_id,
            'f_acc_rapid_pairs_30d': pair_count,
            'f_acc_rapid_total_volume': round(pair_volume, 2),
            'f_acc_flow_through_ratio': round(flow_ratio, 3)
        })
    
    pairs_df = pd.DataFrame(rapid_pairs)
    result = result.merge(pairs_df, on='account_id', how='left').fillna(0)
    
    max_pairs = max(result['f_acc_rapid_pairs_30d'].max(), 1)
    result['f_acc_rapid_movement_score'] = np.clip(
        result['f_acc_rapid_pairs_30d'] / max_pairs * 0.6 +
        result['f_acc_flow_through_ratio'] * 0.4,
        0, 1
    ).round(3)
    
    return result`,

  "Score transactions based on cross-border + high-risk country + amount": `"""
Feature Block: Cross-Border Wire Risk Scoring
Description: Multi-factor risk score combining cross-border
  status, jurisdiction risk, and transaction amount.
Axis: TRANSACTION | Risk Typology: RT#11
Output: f_txn_wire_risk_score, f_txn_jurisdiction_risk,
        f_txn_amount_risk, f_txn_cross_border_risk_flag
"""
import pandas as pd
import numpy as np

def compute_features(datasets):
    txn = datasets.get('transactions')
    
    HIGH_RISK = {'IR','KP','SY','AF','MM','YE','SO','SD','LY','IQ'}
    ELEVATED_RISK = {'RU','BY','VE','NI','ZW','KH','LA','PK','NG'}
    TAX_HAVENS = {'KY','PA','VG','BVI','BM','JE','GG','IM','LI','MC'}
    
    result = txn[['transaction_id']].copy()
    
    # Factor 1: Jurisdiction risk (0-1)
    orig_high = txn['originator_country'].isin(HIGH_RISK)
    benf_high = txn['beneficiary_country'].isin(HIGH_RISK)
    orig_elev = txn['originator_country'].isin(ELEVATED_RISK)
    benf_elev = txn['beneficiary_country'].isin(ELEVATED_RISK)
    orig_haven = txn['originator_country'].isin(TAX_HAVENS)
    benf_haven = txn['beneficiary_country'].isin(TAX_HAVENS)
    
    result['f_txn_jurisdiction_risk'] = np.where(
        orig_high | benf_high, 1.0,
        np.where(orig_elev | benf_elev, 0.7,
            np.where(orig_haven | benf_haven, 0.5, 0.0))
    )
    
    # Factor 2: Amount risk (percentile-based)
    result['f_txn_amount_risk'] = np.clip(
        txn['amount'].rank(pct=True), 0, 1
    ).round(3)
    
    # Factor 3: Cross-border indicator
    is_cross = txn['is_cross_border'].astype(float)
    
    # Composite score: weighted combination
    result['f_txn_wire_risk_score'] = np.clip(
        result['f_txn_jurisdiction_risk'] * 0.45 +
        result['f_txn_amount_risk'] * 0.30 +
        is_cross * 0.25,
        0, 1
    ).round(3)
    
    result['f_txn_cross_border_risk_flag'] = (
        (result['f_txn_wire_risk_score'] > 0.6) & 
        (txn['is_cross_border'] == True)
    ).astype(int)
    
    return result`,

  "Compute rolling 30-day counterparty diversity per account": `"""
Feature Block: Counterparty Diversity Metrics
Description: Measures the diversity and concentration of
  counterparties per account over a 30-day rolling window.
Axis: ACCOUNT | Risk Typology: RT#42
Output: f_acc_unique_counterparties_30d, f_acc_top_counterparty_pct,
        f_acc_counterparty_diversity_score, f_acc_fan_out_flag
"""
import pandas as pd
import numpy as np

def compute_features(datasets):
    txn = datasets.get('transactions')
    accounts = datasets.get('accounts')
    
    result = accounts[['account_id']].copy()
    txn['transaction_date'] = pd.to_datetime(txn['transaction_date'])
    cutoff = txn['transaction_date'].max() - pd.Timedelta(days=30)
    recent = txn[txn['transaction_date'] >= cutoff]
    
    metrics = []
    for acc_id, grp in recent.groupby('account_id'):
        counterparties = grp['beneficiary_name'].value_counts()
        unique_ct = len(counterparties)
        top_pct = counterparties.iloc[0] / len(grp) if len(grp) > 0 else 0
        
        # Shannon entropy for diversity
        probs = counterparties / counterparties.sum()
        entropy = -(probs * np.log2(probs + 1e-10)).sum()
        max_entropy = np.log2(max(unique_ct, 1))
        norm_entropy = entropy / max_entropy if max_entropy > 0 else 0
        
        metrics.append({
            'account_id': acc_id,
            'f_acc_unique_counterparties_30d': unique_ct,
            'f_acc_top_counterparty_pct': round(top_pct, 3),
            'f_acc_counterparty_diversity_score': round(norm_entropy, 3),
            'f_acc_fan_out_flag': int(unique_ct > 15)
        })
    
    df = pd.DataFrame(metrics)
    result = result.merge(df, on='account_id', how='left').fillna(0)
    return result`,

  "Detect dormant account reactivation with sudden high volume": `"""
Feature Block: Dormant Account Reactivation
Description: Identifies accounts that were inactive for 90+
  days and suddenly show high-volume activity.
Axis: ACCOUNT | Risk Typology: RT#23
Output: f_acc_days_inactive, f_acc_reactivation_flag,
        f_acc_post_react_volume, f_acc_reactivation_risk_score
"""
import pandas as pd
import numpy as np

def compute_features(datasets):
    txn = datasets.get('transactions')
    accounts = datasets.get('accounts')
    
    DORMANCY_DAYS = 90
    
    result = accounts[['account_id']].copy()
    txn['transaction_date'] = pd.to_datetime(txn['transaction_date'])
    max_date = txn['transaction_date'].max()
    
    metrics = []
    for acc_id, grp in txn.groupby('account_id'):
        sorted_dates = grp['transaction_date'].sort_values()
        gaps = sorted_dates.diff().dt.days
        max_gap = gaps.max() if len(gaps) > 1 else 0
        
        was_dormant = max_gap >= DORMANCY_DAYS if max_gap else False
        
        recent_30 = grp[grp['transaction_date'] >= max_date - pd.Timedelta(days=30)]
        post_vol = recent_30['amount'].sum()
        
        metrics.append({
            'account_id': acc_id,
            'f_acc_days_inactive': int(max_gap) if max_gap else 0,
            'f_acc_reactivation_flag': int(was_dormant and len(recent_30) > 0),
            'f_acc_post_react_volume': round(post_vol, 2),
        })
    
    df = pd.DataFrame(metrics)
    result = result.merge(df, on='account_id', how='left').fillna(0)
    
    max_vol = max(result['f_acc_post_react_volume'].max(), 1)
    result['f_acc_reactivation_risk_score'] = np.clip(
        result['f_acc_reactivation_flag'] * 0.4 +
        (result['f_acc_days_inactive'] / 365) * 0.3 +
        (result['f_acc_post_react_volume'] / max_vol) * 0.3,
        0, 1
    ).round(3)
    
    return result`,

  "Flag PEP-linked transactions with unusual amounts": `"""
Feature Block: PEP Transaction Anomaly
Description: Flags transactions linked to PEP clients where
  amounts deviate significantly from their profile.
Axis: TRANSACTION | Risk Typology: RT#18
Output: f_txn_pep_linked, f_txn_pep_amount_zscore,
        f_txn_pep_anomaly_flag, f_txn_pep_risk_score
"""
import pandas as pd
import numpy as np

def compute_features(datasets):
    txn = datasets.get('transactions')
    clients = datasets.get('clients')
    
    result = txn[['transaction_id']].copy()
    
    pep_ids = set(clients[clients['pep_status'] == True]['client_id'])
    result['f_txn_pep_linked'] = txn['client_id'].isin(pep_ids).astype(int)
    
    # Z-score of amount within each client's history
    client_stats = txn.groupby('client_id')['amount'].agg(['mean','std']).reset_index()
    client_stats.columns = ['client_id','cli_mean','cli_std']
    
    merged = txn.merge(client_stats, on='client_id', how='left')
    z_scores = np.where(
        merged['cli_std'] > 0,
        (merged['amount'] - merged['cli_mean']) / merged['cli_std'],
        0.0
    )
    result['f_txn_pep_amount_zscore'] = np.round(z_scores, 3)
    
    result['f_txn_pep_anomaly_flag'] = (
        (result['f_txn_pep_linked'] == 1) & 
        (np.abs(result['f_txn_pep_amount_zscore']) > 2.0)
    ).astype(int)
    
    result['f_txn_pep_risk_score'] = np.clip(
        result['f_txn_pep_linked'] * 0.4 +
        np.clip(np.abs(result['f_txn_pep_amount_zscore']) / 4, 0, 1) * 0.6,
        0, 1
    ).round(3)
    
    return result`,
};
const AI_DEFAULT_CODE = AI_CODE_TEMPLATES["Score transactions based on cross-border + high-risk country + amount"];

    const noDisallowed = !codeText.includes('import os') && !codeText.includes('import sys') && !codeText.includes('subprocess') && !codeText.includes('__import__');

    steps.push({ delay: 400, fn: () => {
      const results = [
        { check: "Python syntax parse", status: balancedParens && balancedBrackets ? "pass" : "fail", detail: balancedParens && balancedBrackets ? "No syntax errors detected" : "Unbalanced parentheses or brackets" },

      ];
      setValidationResults(prev => [...prev, ...results]);
      setValidationStage('contract');
    }});

    // Step 2: Contract check (800ms)
    steps.push({ delay: 800, fn: () => {
      const featureOutputs = (codeText.match(/result\['(f_\w+)'\]/g) || []).map(m => m.match(/'(f_\w+)'/)[1]);
      const results = [
        { check: "Function signature", status: hasDef ? "pass" : "fail", detail: hasDef ? "compute_features(datasets) found" : "Missing required function: compute_features(datasets)" },
        { check: "Return statement", status: hasReturn ? "pass" : "fail", detail: hasReturn ? "Function returns a DataFrame" : "Missing return statement — function must return pd.DataFrame" },
        { check: "Feature naming convention", status: featureOutputs.every(f => /^f_(txn|acc|cli|der)_/.test(f)) ? "pass" : featureOutputs.length > 0 ? "warn" : "warn", detail: featureOutputs.length > 0 ? `${featureOutputs.length} features detected: ${featureOutputs.slice(0,3).join(', ')}${featureOutputs.length > 3 ? '...' : ''}` : "No feature columns detected matching f_{axis}_ pattern" },
        { check: "Entity key column", status: codeText.includes("transaction_id") || codeText.includes("account_id") || codeText.includes("client_id") ? "pass" : "warn", detail: "Entity key column included in output" },
        { check: "Null handling", status: codeText.includes("fillna") || codeText.includes("dropna") ? "pass" : "warn", detail: codeText.includes("fillna") ? "Null handling via fillna() detected" : "No explicit null handling — consider adding fillna() for robustness" },
      ];
      setValidationResults(prev => [...prev, ...results]);
      setValidationStage('dryrun');
    }});

    // Step 3: Dry run on sample data (1400ms)
    steps.push({ delay: 1400, fn: () => {
      const results = [
        { check: "Dry run (100 rows)", status: hasDef && hasReturn ? "pass" : "fail", detail: hasDef && hasReturn ? "Executed on 100-row sample in 23ms — no runtime errors" : "Dry run failed — fix function signature and return" },

        // Add 1-3 lines per tick for natural streaming feel

                          <span style={{ fontSize: 11, color: "#475569" }}>Processing...</span>
                        </div>}
                      </div>

                      {/* Streaming code */}
                      <div style={{ flex: 1, background: "#0a0e1a", border: "1px solid #1e293b", borderRadius: 8, overflow: "auto", position: "relative" }}>
                        <div style={{ padding: "8px 14px", borderBottom: "1px solid #1e293b", fontSize: 10, color: "#475569", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.05em", display: "flex", justifyContent: "space-between", position: "sticky", top: 0, background: "#0a0e1a", zIndex: 1 }}>
                          <span>Generated Code</span>
                          <span style={{ fontFamily: "'JetBrains Mono', monospace" }}>{(genStage === 'done' ? code : streamedCode).split('\n').length} lines</span>
                        </div>
                        <pre style={{ margin: 0, padding: "10px 14px", fontSize: 11.5, fontFamily: "'JetBrains Mono', monospace", lineHeight: 1.7, color: "#e2e8f0", whiteSpace: "pre-wrap" }}>
                          {genStage === 'done' ? code : streamedCode}
                          {generating && genStage === 'streaming' && <span style={{ background: "#3b82f6", animation: "blink 1s step-end infinite" }}>▎</span>}
                        </pre>
                      </div>
                    </div>

                    {/* Post-generation actions */}
                    {generated && !generating && (
                      <div style={{ display: "flex", gap: 8, flexShrink: 0 }}>
                        <button onClick={() => { setGenerated(false); setGenStage(null); setGenLog([]); setStreamedCode(""); }} style={{ padding: "7px 14px", background: "#1e293b", color: "#94a3b8", border: "1px solid #334155", borderRadius: 6, fontSize: 11, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 5 }}><Icon name="refresh" size={12} />Regenerate</button>
                        <button onClick={() => { setTab("code"); }} style={{ padding: "7px 14px", background: "#1e3a5f", color: "#93c5fd", border: "1px solid #3b82f6", borderRadius: 6, fontSize: 11, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 5 }}><Icon name="edit" size={12} />Edit Code</button>
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}

            {/* ── CODE TAB ── */}
            {tab === "code" && (
              <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
                {/* AI badge */}
                {generated && (
                  <div style={{ margin: "12px 20px 0", padding: "7px 14px", background: "#2e1f5e", borderRadius: 8, border: "1px solid #8b5cf6", display: "flex", alignItems: "center", justifyContent: "space-between", fontSize: 12, color: "#c4b5fd", flexShrink: 0 }}>
                    <span style={{ display: "flex", alignItems: "center", gap: 6 }}><Icon name="sparkle" size={14} />AI-generated code — review and edit before saving</span>
                    <button onClick={() => setTab("ai")} style={{ background: "none", border: "none", color: "#8b5cf6", cursor: "pointer", fontSize: 11, fontFamily: "inherit", textDecoration: "underline" }}>Back to AI</button>
                  </div>
                )}

                {/* Code Editor */}
                <div style={{ flex: 1, padding: "12px 20px", display: "flex", flexDirection: "column", minHeight: 0 }}>
                  <label style={{ display: "block", fontSize: 10, color: "#94a3b8", marginBottom: 4, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.05em", flexShrink: 0 }}>Feature Code (Python)</label>
                  <div style={{ flex: 1, display: "flex", border: "1px solid #1e293b", borderRadius: 8, overflow: "hidden", minHeight: 0 }}>
                    {/* Line numbers */}
                    <div style={{ width: 40, background: "#080c16", overflow: "hidden", flexShrink: 0 }}>
                      {code.split("\n").map((_, i) => (
                        <div key={i} style={{ height: 20, lineHeight: "20px", textAlign: "right", paddingRight: 8, fontSize: 11, color: "#334155", fontFamily: "'JetBrains Mono', monospace" }}>{i + 1}</div>
                      ))}
                    </div>
                    <textarea value={code} onChange={e => { setCode(e.target.value); setValidationResults([]); setValidationSummary(null); setSampleOutput(null); setValidationStage(null); }} spellCheck={false} style={{ flex: 1, padding: "0 12px", background: "#0a0e1a", border: "none", color: "#e2e8f0", fontSize: 12, fontFamily: "'JetBrains Mono', monospace", outline: "none", resize: "none", lineHeight: "20px", tabSize: 4 }} />
                  </div>
                </div>

                {/* Validation Results Panel (slides up when present) */}
                {(validating || validationResults.length > 0) && (
                  <div style={{ borderTop: "1px solid #1e293b", maxHeight: 260, overflow: "auto", padding: "12px 20px", background: "#0d1117", flexShrink: 0, animation: "fadeIn 0.3s ease" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <span style={{ fontSize: 12, fontWeight: 600, color: "#f1f5f9" }}>Validation Results</span>
                        {validating && <span style={{ width: 12, height: 12, border: "2px solid #3b82f630", borderTop: "2px solid #3b82f6", borderRadius: "50%", display: "inline-block", animation: "spin 0.8s linear infinite" }} />}
                        {validationStage && !validating && (
                          <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 4, background: validationSummary?.fail > 0 ? "#450a0a" : "#064e3b", color: validationSummary?.fail > 0 ? "#fca5a5" : "#6ee7b7", fontWeight: 600 }}>
                            {validationSummary?.fail > 0 ? "FAILED" : "ALL CHECKS PASSED"}
                          </span>
                        )}
                      </div>
                      {validationSummary && (
                        <div style={{ display: "flex", gap: 10, fontSize: 11 }}>
                          <span style={{ color: "#10b981" }}>✓ {validationSummary.pass} passed</span>
                          {validationSummary.warn > 0 && <span style={{ color: "#f59e0b" }}>⚠ {validationSummary.warn} warnings</span>}
                          {validationSummary.fail > 0 && <span style={{ color: "#ef4444" }}>✗ {validationSummary.fail} failed</span>}
                        </div>
                      )}
                    </div>

                    {/* Stage progress */}
                    {validating && (
                      <div style={{ display: "flex", gap: 4, marginBottom: 12 }}>
                        {['syntax','contract','dryrun','output'].map(s => {
                          const order = ['syntax','contract','dryrun','output','done'];
                          const active = validationStage === s;
                          const done = order.indexOf(validationStage) > order.indexOf(s);
                          return <div key={s} style={{ flex: 1, height: 3, borderRadius: 2, background: done ? "#10b981" : active ? "#3b82f6" : "#1e293b", transition: "background 0.3s" }} />;
                        })}
                      </div>
                    )}

                    {/* Result rows */}
                    {validationResults.map((r, i) => <ValRow key={i} r={r} />)}

                    {/* Sample Output Preview */}
                    {sampleOutput && (
                      <div style={{ marginTop: 12, padding: 12, background: "#111827", borderRadius: 8, border: "1px solid #1e293b" }}>
                        <div style={{ fontSize: 10, color: "#64748b", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 8 }}>Sample Output Preview (5 rows)</div>
                        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, fontFamily: "'JetBrains Mono', monospace" }}>
                          <thead>
                            <tr>{sampleOutput.columns.map(c => <th key={c} style={{ padding: "4px 8px", textAlign: "left", borderBottom: "1px solid #1e293b", color: "#64748b", fontSize: 10 }}>{c}</th>)}</tr>
                          </thead>
                          <tbody>
                            {sampleOutput.rows.map((row, ri) => (
                              <tr key={ri}>
                                <td style={{ padding: "4px 8px", color: "#3b82f6" }}>{row.id}</td>
                                {row.values.map((v, vi) => (
                                  <td key={vi} style={{ padding: "4px 8px", color: v > 0.7 ? "#ef4444" : v > 0.4 ? "#f59e0b" : "#94a3b8" }}>{v}</td>
                                ))}
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>

        {/* Modal Footer */}
        <div style={{ padding: "12px 24px", borderTop: "1px solid #1e293b", display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0 }}>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={runValidation} disabled={validating || generating} style={{ padding: "8px 16px", background: validating ? "#1e293b" : validationSummary && !validationSummary.fail ? "#064e3b" : "#1e293b", color: validationSummary && !validationSummary.fail ? "#6ee7b7" : "#94a3b8", border: `1px solid ${validationSummary && !validationSummary.fail ? "#10b981" : "#334155"}`, borderRadius: 8, fontSize: 12, cursor: validating ? "default" : "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 6, fontWeight: 600, transition: "all 0.2s" }}>
              {validating ? <><span style={{ width: 12, height: 12, border: "2px solid #94a3b830", borderTop: "2px solid #94a3b8", borderRadius: "50%", display: "inline-block", animation: "spin 0.8s linear infinite" }} />Validating...</> : validationSummary && !validationSummary.fail ? <><Icon name="check" size={13} />Validated</> : <><Icon name="check" size={13} />Validate Code</>}
            </button>
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={onClose} style={{ padding: "8px 16px", background: "transparent", color: "#64748b", border: "1px solid #334155", borderRadius: 8, fontSize: 13, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
            <button style={{ padding: "8px 16px", background: "#1e293b", color: "#94a3b8", border: "1px solid #334155", borderRadius: 8, fontSize: 13, cursor: "pointer", fontFamily: "inherit" }}>Save as Draft</button>
            <button onClick={handleSave} disabled={generating} style={{ padding: "8px 20px", background: generating ? "#334155" : "linear-gradient(135deg, #10b981, #059669)", color: "#fff", border: "none", borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: generating ? "default" : "pointer", fontFamily: "inherit" }}>Save & Activate</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── BLOCK DETAIL MODAL ────────────────────────────────────────────────
function BlockDetailModal({ block, onClose }) {
  const c = CATEGORY_COLORS[block.category];
  const st = STATUS_STYLES[block.status];
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", animation: "fadeIn 0.2s ease" }}>
      <div onClick={onClose} style={{ position: "absolute", inset: 0, background: "#00000080", backdropFilter: "blur(4px)" }} />
      <div style={{ position: "relative", width: "80%", maxWidth: 860, maxHeight: "82vh", background: "#111827", border: "1px solid #1e293b", borderRadius: 16, display: "flex", flexDirection: "column", animation: "scaleIn 0.25s ease", overflow: "hidden" }}>
        <div style={{ padding: "18px 24px", borderBottom: "1px solid #1e293b", display: "flex", justifyContent: "space-between", alignItems: "start" }}>
          <div>
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 6 }}>
              <h2 style={{ margin: 0, fontSize: 17, fontWeight: 700 }}>{block.name}</h2>
              <span style={{ background: st.bg, color: st.text, padding: "2px 8px", borderRadius: 6, fontSize: 10, fontWeight: 600 }}>{st.label}</span>
              {block.createdBy === "AI_GENERATED" && <span style={{ background: "#4a1d96", color: "#c4b5fd", padding: "2px 8px", borderRadius: 6, fontSize: 10, display: "flex", alignItems: "center", gap: 3 }}><Icon name="sparkle" size={9} />AI Generated</span>}
            </div>
            <p style={{ margin: 0, fontSize: 13, color: "#94a3b8" }}>{block.desc}</p>
          </div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "#64748b", cursor: "pointer", padding: 4 }}><Icon name="x" size={20} /></button>
        </div>

        <div style={{ flex: 1, overflow: "auto", padding: 24 }}>
          {/* Metadata */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12, marginBottom: 20 }}>
            {[
              { label: "Category", value: block.category, bg: c.bg, color: c.text },
              { label: "Axis", value: block.axis, bg: c.bg, color: c.text },
              { label: "Risk Typology", value: block.rt, bg: "#1e293b", color: "#94a3b8" },
              { label: "Execution Time", value: `${block.lastExecMs}ms`, bg: "#1e293b", color: "#94a3b8" },
            ].map(m => (
              <div key={m.label} style={{ background: "#0a0e1a", borderRadius: 8, padding: 12, border: "1px solid #1e293b" }}>
                <div style={{ fontSize: 10, color: "#64748b", marginBottom: 4, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.05em" }}>{m.label}</div>
                <span style={{ background: m.bg, color: m.color, padding: "2px 8px", borderRadius: 4, fontSize: 12, fontWeight: 600 }}>{m.value}</span>
              </div>
            ))}
          </div>

          {/* Output Features */}
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 11, color: "#64748b", marginBottom: 8, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.05em" }}>Output Features ({block.outputs.length})</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              {block.outputs.map(o => (
                <span key={o} style={{ background: "#1e293b", color: "#94a3b8", padding: "4px 10px", borderRadius: 6, fontSize: 12, fontFamily: "'JetBrains Mono', monospace", border: "1px solid #334155" }}>{o}</span>
              ))}
            </div>
          </div>

          {/* Code */}
          <div>
            <div style={{ fontSize: 11, color: "#64748b", marginBottom: 8, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.05em" }}>Feature Code</div>
            <pre style={{ background: "#0a0e1a", border: "1px solid #1e293b", borderRadius: 10, padding: 18, margin: 0, overflow: "auto", maxHeight: 300, fontSize: 12, fontFamily: "'JetBrains Mono', monospace", lineHeight: 1.7, color: "#94a3b8" }}>
              {block.code}
            </pre>
          </div>
        </div>

        <div style={{ padding: "14px 24px", borderTop: "1px solid #1e293b", display: "flex", gap: 10, justifyContent: "flex-end" }}>
          <button style={{ padding: "7px 14px", background: "#1e293b", color: "#94a3b8", border: "1px solid #334155", borderRadius: 8, fontSize: 12, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 6 }}><Icon name="copy" size={13} />Duplicate</button>
          <button style={{ padding: "7px 14px", background: "#1e293b", color: "#94a3b8", border: "1px solid #334155", borderRadius: 8, fontSize: 12, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 6 }}><Icon name="edit" size={13} />Edit</button>
          <button style={{ padding: "7px 14px", background: "#10b981", color: "#fff", border: "none", borderRadius: 8, fontSize: 12, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 6, fontWeight: 600 }}><Icon name="play" size={13} />Run Block</button>
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
