// ═════════════ UI COMPONENTS ═════════════
const Badge=({text,color=T.accent})=>(
  <span style={{fontFamily:font.mono,fontSize:10,color,background:color+"18",padding:"3px 10px",borderRadius:20,border:`1px solid ${color}30`,letterSpacing:.3,whiteSpace:"nowrap"}}>{text}</span>
);

const Metric=({label,value,color=T.accent,sub:subtitle,trend})=>(
  <div style={{padding:"16px 20px",background:T.card,borderRadius:12,border:`1px solid ${T.border}`,flex:1,minWidth:140}}>
    <div style={{fontFamily:font.mono,fontSize:10,color:T.muted,letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>{label}</div>
    <div style={{display:"flex",alignItems:"baseline",gap:8}}>
      <span style={{fontFamily:font.mono,fontSize:28,fontWeight:700,color}}>{value}</span>
      {trend&&<span style={{fontFamily:font.mono,fontSize:11,color:trend>0?T.red:T.success}}>{trend>0?"+":""}{trend}%</span>}
    </div>
    {subtitle&&<div style={{fontFamily:font.mono,fontSize:10,color:T.muted,marginTop:4}}>{subtitle}</div>}
  </div>
);

const ScoreGauge=({label,score,color,delay=0})=>{
  const[anim,setAnim]=useState(0);
  useEffect(()=>{const t=setTimeout(()=>setAnim(score),200+delay);return()=>clearTimeout(t)},[score,delay]);
  return(
    <div style={{textAlign:"center"}}>
      <svg width="80" height="80" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="34" fill="none" stroke={T.border} strokeWidth="4"/>
        <circle cx="40" cy="40" r="34" fill="none" stroke={color} strokeWidth="4"
          strokeDasharray={`${anim*213.6} 213.6`} strokeLinecap="round"
          transform="rotate(-90 40 40)" style={{transition:"stroke-dasharray 1.2s cubic-bezier(.4,0,.2,1)"}}/>
        <text x="40" y="38" textAnchor="middle" fill={color} fontFamily={font.mono} fontSize="16" fontWeight="700">{Math.round(anim*100)}</text>
        <text x="40" y="50" textAnchor="middle" fill={T.muted} fontFamily={font.mono} fontSize="7">/100</text>
      </svg>
      <div style={{fontFamily:font.mono,fontSize:9,color:T.sub,marginTop:2}}>{label}</div>
    </div>
  );
};

const ProgressBar=({value,color,height=5})=>(
  <div style={{background:T.border,borderRadius:height,height,overflow:"hidden",flex:1}}>
    <div style={{width:`${value*100}%`,height:"100%",background:color,borderRadius:height,transition:"width .8s ease"}}/>
  </div>
);

const Tab=({items,active,onChange})=>(
  <div style={{display:"flex",gap:2,background:T.panel,borderRadius:10,padding:3,marginBottom:20}}>
    {items.map((item,i)=>(
      <button key={i} onClick={()=>onChange(i)} style={{
        flex:1,padding:"8px 12px",borderRadius:8,border:"none",cursor:"pointer",
        background:active===i?T.card:"transparent",
        color:active===i?T.accent:T.muted,
        fontFamily:font.mono,fontSize:11,fontWeight:active===i?600:400,
      }}>{item}</button>
    ))}
  </div>
);

// ═════════════ SCORING SIMULATOR ═════════════
function ScoringSimulator(){
  const[mode,setMode]=useState("single");
  const[scenario,setScenario]=useState(0);
  const[running,setRunning]=useState(false);
  const[stage,setStage]=useState(-1);
  const[batchDone,setBatchDone]=useState(false);
  const[batchFilter,setBatchFilter]=useState("All");

  const singleTxns=[BATCH_TRANSACTIONS[0],BATCH_TRANSACTIONS[5],BATCH_TRANSACTIONS[9]];
  const tx=singleTxns[scenario];

  const stages=[
    {name:"L1: Feature Factory",layer:"L1",color:T.gold,detail:`Ingestion Tier: ${tx.l1.features} features computed. HRG=${tx.l1.hrg}, TaxHaven=${tx.l1.taxHaven}, PEP=${tx.l1.pepStatus}, KYC Risk=${tx.l1.kycRisk}. Validation Gateway: PASS. Stored in Delta Lake Feature Store.`},
    {name:"L2: Axis Evaluation + Scoring",layer:"L2",color:T.purple,scores:tx.l2.typologies,detail:tx.l2.typologies.length===0?"Anomaly Engine (VAE): reconstruction loss = 0.88. No targeted typology matched. Zero-day pattern detected.":"Axis: "+tx.l2.axis+". Model types: "+[...new Set(tx.l2.typologies.map(t=>t.model))].join(", ")+". Recurrence: "+tx.l2.recurrence+" in "+tx.l2.recurrenceWindow+"."},
    {name:"L3: Signal Aggregation",layer:"L3",color:T.teal,detail:`Entity Resolution (Zingg): ${tx.l3.entityResolved?"Resolved":"Unresolved"}. Linked accounts: ${tx.l3.linkedAccounts}. ATL-Only Score: ${tx.l3.atlScore}. Anomaly Score: ${tx.l3.anomalyScore}. Lineage tracked to ${tx.l2.typologies.length} occurrences.`},
    {name:"L4: Risk Appetite",layer:"L4",color:T.red,detail:`Track: ${tx.l4.track}. ${tx.l4.track==="A"?"Policy Matcher: zero-tolerance triggered → Auto-Escalator → immediate ATL.":"ML Classifier score: "+tx.l4.mlScore+". Historical match: "+tx.l4.historicalMatch+". Past outcome: "+tx.l4.pastOutcome+"."} Decision: ${tx.l4.decision}. Priority: ${tx.l4.priority}.`},
    {name:"L5: Alert Packaging",layer:"L5",color:T.orange,detail:tx.l5.alertId!=="None"?`Alert ${tx.l5.alertId} created. Template: ${tx.l5.template}. Levels: ${tx.l5.level}. Routed to Case Management.`:"No alert generated. BTL classification. Available for sampling pool."},
  ];

  const runSingle=()=>{setStage(-1);setRunning(true);let i=0;const t=setInterval(()=>{setStage(i);i++;if(i>=stages.length){clearInterval(t);setRunning(false)}},700)};
  const runBatch=()=>{setBatchDone(false);setRunning(true);setTimeout(()=>{setBatchDone(true);setRunning(false)},2000)};

  const layerColor=l=>l==="L1"?T.gold:l==="L2"?T.purple:l==="L3"?T.teal:l==="L4"?T.red:T.orange;

  const batchFiltered=batchFilter==="All"?BATCH_TRANSACTIONS:batchFilter==="ATL"?BATCH_TRANSACTIONS.filter(t=>t.status.includes("ATL")):BATCH_TRANSACTIONS.filter(t=>t.status.includes("Clean"));

  return(
    <div>
      {/* Mode Toggle */}
      <div style={{display:"flex",gap:8,marginBottom:20}}>
        <div style={{display:"flex",gap:2,background:T.panel,borderRadius:10,padding:3}}>
          <button onClick={()=>{setMode("single");setStage(-1);setBatchDone(false)}} style={{padding:"8px 20px",borderRadius:8,border:"none",cursor:"pointer",background:mode==="single"?T.accent+"20":"transparent",color:mode==="single"?T.accent:T.muted,fontFamily:font.mono,fontSize:11,fontWeight:600}}>Single Transaction</button>
          <button onClick={()=>{setMode("batch");setStage(-1);setBatchDone(false)}} style={{padding:"8px 20px",borderRadius:8,border:"none",cursor:"pointer",background:mode==="batch"?T.accent+"20":"transparent",color:mode==="batch"?T.accent:T.muted,fontFamily:font.mono,fontSize:11,fontWeight:600}}>Batch Run (10 Txns)</button>
        </div>
      </div>

      {mode==="single"&&(
        <div>
          <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
            {singleTxns.map((t,i)=>(
              <button key={i} onClick={()=>{setScenario(i);setStage(-1)}} style={{padding:"8px 16px",borderRadius:8,border:`1px solid ${scenario===i?t.color+"60":T.border}`,background:scenario===i?t.color+"10":"transparent",color:scenario===i?t.color:T.muted,fontFamily:font.mono,fontSize:10,fontWeight:600,cursor:"pointer"}}>{t.entity.split(" ").slice(0,2).join(" ")} ({t.status})</button>
            ))}
            <button onClick={runSingle} disabled={running} style={{padding:"8px 24px",borderRadius:8,border:"none",cursor:running?"default":"pointer",background:running?T.muted:T.accent,color:T.bg,fontFamily:font.mono,fontSize:12,fontWeight:700,opacity:running?.5:1,marginLeft:"auto"}}>
              {running?"Scoring...":"Run Pipeline"}
            </button>
          </div>

          {/* Transaction Card */}
          <div style={{background:T.card,borderRadius:14,border:`1px solid ${T.border}`,padding:18,marginBottom:16}}>
            <div style={{fontFamily:font.mono,fontSize:9,color:T.muted,letterSpacing:1.5,marginBottom:10}}>INPUT: {tx.id}</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
              {[{l:"Entity",v:tx.entity},{l:"Amount",v:"$"+tx.amount.toLocaleString()},{l:"To",v:tx.to},{l:"Destination",v:tx.toCountry},{l:"Product",v:tx.product},{l:"Frequency",v:tx.frequency},{l:"Client Age",v:tx.clientAge},{l:"Risk Profile",v:tx.riskProfile}].map((f,i)=>(
                <div key={i}><div style={{fontFamily:font.mono,fontSize:8,color:T.muted,marginBottom:1}}>{f.l}</div><div style={{fontFamily:font.mono,fontSize:11,color:T.text}}>{f.v}</div></div>
              ))}
            </div>
          </div>

          {/* Pipeline Stages */}
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {stages.map((st,i)=>{
              const active=i<=stage;const current=i===stage;const lc=layerColor(st.layer);
              return(
                <div key={i} style={{background:active?T.card:T.panel,borderRadius:12,border:`1px solid ${current?lc+"60":T.border}`,padding:active?"14px 18px":"10px 18px",transition:"all .4s",opacity:active?1:.4}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:26,height:26,borderRadius:8,background:active?lc+"20":T.border,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:font.mono,fontSize:10,fontWeight:700,color:active?lc:T.muted,flexShrink:0}}>{i+1}</div>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontFamily:font.mono,fontSize:12,color:active?T.text:T.muted,fontWeight:600}}>{st.name}</span>
                        <Badge text={st.layer} color={lc}/>
                      </div>
                    </div>
                    {active&&<div style={{width:8,height:8,borderRadius:"50%",background:current?lc:T.success}}/>}
                  </div>
                  {active&&st.scores&&st.scores.length>0&&(
                    <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
                      {st.scores.map((sc,j)=>(
                        <div key={j} style={{padding:"5px 10px",background:sc.atl?sc.score>.8?T.red+"12":T.gold+"12":T.border+"40",borderRadius:8,border:`1px solid ${sc.atl?sc.score>.8?T.red:T.gold:T.muted}20`,display:"flex",alignItems:"center",gap:6}}>
                          <span style={{fontFamily:font.mono,fontSize:9,color:T.sub}}>{sc.id} {sc.name}</span>
                          <span style={{fontFamily:font.mono,fontSize:12,fontWeight:700,color:sc.atl?sc.score>.8?T.red:T.gold:T.muted}}>{sc.score.toFixed(2)}</span>
                          <Badge text={sc.atl?"ATL":"BTL"} color={sc.atl?T.red:T.muted}/>
                          <span style={{fontFamily:font.mono,fontSize:8,color:T.muted}}>{sc.model}</span>
                        </div>
                      ))}
                    </div>
                  )}
                  {active&&st.detail&&(
                    <div style={{marginTop:8,padding:"8px 12px",background:T.panel,borderRadius:8,fontFamily:font.mono,fontSize:10,color:T.sub,lineHeight:1.7}}>{st.detail}</div>
                  )}
                </div>
              );
            })}
          </div>

          {stage>=stages.length-1&&(
            <div style={{marginTop:16}}>
              {/* Score Gauges */}
              <div style={{padding:20,background:T.card,borderRadius:14,border:`1px solid ${T.border}`,marginBottom:12}}>
                <div style={{fontFamily:font.mono,fontSize:10,color:T.muted,letterSpacing:1.5,textAlign:"center",marginBottom:14}}>AXIS SCORE BREAKDOWN</div>
                <div style={{display:"flex",justifyContent:"center",gap:16,flexWrap:"wrap"}}>
                  {tx.axisScores&&[
                    {label:"Transaction",score:tx.axisScores.transaction,color:T.blue},
                    {label:"Account",score:tx.axisScores.account,color:T.teal},
                    {label:"Client",score:tx.axisScores.client,color:T.gold},
                    {label:"Product",score:tx.axisScores.product,color:T.orange},
                    {label:"Network",score:tx.axisScores.network,color:T.purple},
                    {label:"Anomaly",score:tx.axisScores.anomaly,color:T.cyan},
                  ].filter(a=>a.score>0).map((a,i)=>(
                    <ScoreGauge key={i} label={a.label} score={a.score} color={a.color} delay={i*150}/>
                  ))}
                  <ScoreGauge label="FINAL" score={tx.l3.atlScore||tx.l3.anomalyScore} color={tx.status.includes("ATL")?T.red:T.accent} delay={800}/>
                </div>
              </div>
              {/* Result Banner */}
              <div style={{padding:18,background:tx.status.includes("ATL")?T.redDim:T.accentDim,borderRadius:14,border:`1px solid ${tx.status.includes("ATL")?T.red:T.accent}30`}}>
                <div style={{textAlign:"center",fontFamily:font.mono,fontSize:14,fontWeight:700,color:tx.status.includes("ATL")?T.red:T.accent,marginBottom:8}}>
                  {tx.status.includes("ATL")?"ALERT GENERATED — "+tx.l4.priority:"NO ALERT — Transaction Cleared"}
                </div>
                {tx.status.includes("ATL")&&<div style={{textAlign:"center",fontFamily:font.mono,fontSize:10,color:T.sub,marginBottom:10}}>Track {tx.l4.track} | {tx.l5.alertId} | Template: {tx.l5.template}</div>}
                <div style={{fontFamily:font.mono,fontSize:10,color:T.sub,marginBottom:8,textAlign:"center"}}>Detected by: {tx.caught}</div>
                <div style={{padding:12,background:T.card,borderRadius:10,fontFamily:font.body,fontSize:12,color:T.sub,lineHeight:1.7}}>{tx.caughtDetail}</div>
              </div>
            </div>
          )}
        </div>
      )}

      {mode==="batch"&&(
        <div>
          <div style={{display:"flex",gap:8,marginBottom:16,alignItems:"center"}}>
            <button onClick={runBatch} disabled={running} style={{padding:"8px 24px",borderRadius:8,border:"none",cursor:running?"default":"pointer",background:running?T.muted:T.accent,color:T.bg,fontFamily:font.mono,fontSize:12,fontWeight:700,opacity:running?.5:1}}>
              {running?"Processing 10 transactions...":"Run Batch (10 Transactions)"}
            </button>
            {batchDone&&(
              <div style={{display:"flex",gap:4,marginLeft:"auto"}}>
                {["All","ATL","Clean"].map(f=>(
                  <button key={f} onClick={()=>setBatchFilter(f)} style={{padding:"6px 14px",borderRadius:6,border:`1px solid ${batchFilter===f?T.accent:T.border}`,background:batchFilter===f?T.accent+"15":"transparent",color:batchFilter===f?T.accent:T.muted,fontFamily:font.mono,fontSize:10,cursor:"pointer"}}>{f} ({f==="All"?10:f==="ATL"?BATCH_TRANSACTIONS.filter(t=>t.status.includes("ATL")).length:BATCH_TRANSACTIONS.filter(t=>t.status.includes("Clean")).length})</button>
                ))}
              </div>
            )}
          </div>

          {running&&(
            <div style={{padding:40,textAlign:"center"}}>
              <div style={{fontFamily:font.mono,fontSize:14,color:T.accent,marginBottom:8}}>Processing batch through L1 → L2 → L3 → L4 → L5...</div>
              <div style={{width:"100%",height:4,background:T.border,borderRadius:2,overflow:"hidden"}}>
                <div style={{width:"100%",height:"100%",background:T.accent,borderRadius:2,animation:"pulse 1s infinite"}}/>
              </div>
            </div>
          )}

          {batchDone&&(
            <div>
              {/* Summary Stats */}
              <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
                <Metric label="Total Processed" value="10" color={T.blue} sub="in 2.1 seconds"/>
                <Metric label="ATL Alerts" value="8" color={T.red} sub="80% escalation rate"/>
                <Metric label="BTL (Clean)" value="2" color={T.accent} sub="Correctly cleared"/>
                <Metric label="Track A" value="1" color={T.orange} sub="Auto-escalated (PEP)"/>
              </div>

              {/* Batch Results Table */}
              <div style={{background:T.card,borderRadius:14,border:`1px solid ${T.border}`,overflow:"hidden"}}>
                <div style={{display:"grid",gridTemplateColumns:"90px 1fr 80px 120px 80px 100px 140px",padding:"10px 16px",background:T.panel,borderBottom:`1px solid ${T.border}`,gap:8}}>
                  {["TXN ID","Entity","Amount","Caught By","Score","Track","Status"].map(h=>(
                    <span key={h} style={{fontFamily:font.mono,fontSize:9,color:T.muted,fontWeight:600,letterSpacing:.5}}>{h}</span>
                  ))}
                </div>
                {batchFiltered.map((tx,i)=>(
                  <BatchRow key={i} tx={tx}/>
                ))}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function BatchRow({tx}){
  const[expanded,setExpanded]=useState(false);
  const isClean=tx.status.includes("Clean");
  return(
    <div>
      <div onClick={()=>setExpanded(!expanded)} style={{display:"grid",gridTemplateColumns:"90px 1fr 80px 120px 80px 100px 140px",padding:"10px 16px",borderBottom:`1px solid ${T.border}08`,gap:8,cursor:"pointer",alignItems:"center"}}
        onMouseEnter={e=>e.currentTarget.style.background=T.cardHover}
        onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
        <span style={{fontFamily:font.mono,fontSize:10,color:T.muted}}>{tx.id}</span>
        <span style={{fontFamily:font.body,fontSize:12,color:T.text,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{tx.entity}</span>
        <span style={{fontFamily:font.mono,fontSize:11,color:T.text}}>${(tx.amount/1000).toFixed(0)}K</span>
        <span style={{fontFamily:font.mono,fontSize:9,color:isClean?T.accent:tx.color}}>{tx.caught.split("(")[0].trim()}</span>
        <span style={{fontFamily:font.mono,fontSize:12,fontWeight:700,color:isClean?T.accent:tx.l3.atlScore>.8?T.red:T.gold}}>{(tx.l3.atlScore||tx.l3.anomalyScore).toFixed(2)}</span>
        <Badge text={tx.l4.track==="N/A"?"—":"Track "+tx.l4.track} color={tx.l4.track==="A"?T.red:tx.l4.track==="B"?T.blue:T.muted}/>
        <Badge text={tx.status} color={isClean?T.accent:tx.l4.priority==="CRITICAL"?T.red:tx.l4.priority==="HIGH"?T.orange:T.gold}/>
      </div>
      {expanded&&(
        <div style={{padding:"12px 16px 16px",background:T.panel,borderBottom:`1px solid ${T.border}`}}>
          {/* Axis Score Gauges */}
          {tx.axisScores&&<div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:14,flexWrap:"wrap"}}>
            {[{l:"Txn",s:tx.axisScores.transaction,c:T.blue},{l:"Acct",s:tx.axisScores.account,c:T.teal},{l:"Client",s:tx.axisScores.client,c:T.gold},{l:"Product",s:tx.axisScores.product,c:T.orange},{l:"Network",s:tx.axisScores.network,c:T.purple},{l:"Anomaly",s:tx.axisScores.anomaly,c:T.cyan}].filter(a=>a.s>0).map((a,i)=>(
              <ScoreGauge key={i} label={a.l} score={a.s} color={a.c} delay={i*80}/>
            ))}
            <ScoreGauge label="FINAL" score={tx.l3.atlScore||tx.l3.anomalyScore} color={tx.status.includes("ATL")?T.red:T.accent} delay={600}/>
          </div>}
          {/* 5-Layer Detail Grid */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
            <div style={{padding:10,background:T.gold+"06",borderRadius:8,border:`1px solid ${T.gold}12`,borderLeft:`3px solid ${T.gold}`}}>
              <div style={{fontFamily:font.mono,fontSize:9,color:T.gold,fontWeight:600,marginBottom:6}}>L1: Feature Factory</div>
              <div style={{fontFamily:font.mono,fontSize:8,color:T.sub,lineHeight:1.8}}>
                Ingestion: {tx.product} from {tx.fromCountry}<br/>
                Validation: PASS — schema, completeness, freshness OK<br/>
                Txn Features: HRG={tx.l1.hrg?"true":"false"}, TaxHaven={tx.l1.taxHaven?"true":"false"}, RoundAmt={tx.l1.roundAmt}<br/>
                Entity Features: PEP={tx.l1.pepStatus?"true":"false"}, KYC Risk={tx.l1.kycRisk}<br/>
                Account Features: Profile={tx.l1.txnProfile}<br/>
                Storage: Delta Lake (immutable) + Redis cache
              </div>
            </div>
            <div style={{padding:10,background:T.purple+"06",borderRadius:8,border:`1px solid ${T.purple}12`,borderLeft:`3px solid ${T.purple}`}}>
              <div style={{fontFamily:font.mono,fontSize:9,color:T.purple,fontWeight:600,marginBottom:6}}>L2: Model Layer</div>
              <div style={{fontFamily:font.mono,fontSize:8,color:T.sub,lineHeight:1.8}}>
                Axis Router → {tx.l2.axis}<br/>
                Tuning Matrix: params fetched for {tx.fromCountry}×{tx.riskProfile}×{tx.product}<br/>

        </div>
      )}
    </div>
  );
}

// ═════════════ ARCHITECTURE ═════════════
function Architecture(){
  const[activeLayer,setActiveLayer]=useState(null);
  const layers=[
    {id:"L1",name:"Feature Factory",color:T.gold,
      tiers:["Ingestion Tier: Txn Feed Adapter (Kafka, SWIFT MT103) | KYC Data Adapter (Debezium CDC) | TP Profile Adapter (REST) | List/Ref Adapter (Sanctions, PEP, VASP)","Validation: Data Quality & Validation Gateway — completeness, format, freshness, referential integrity","Computation Tier: Txn Feature Engine (immutable) | Entity Feature Engine (latest-state) | Account Feature Engine (rolling aggregations)","Storage: Feature Store (Delta Lake JSON, ACID + time-travel) | Feature API Service (FastAPI + Redis hot cache) | Dual-Mode Scheduler (batch daily + streaming on-demand)"],
      desc:"Stateless data preparation engine. Ingests from AML Data Layer, TP App, List Management. Computes features at txn/entity/account level. Delta Lake for ACID storage with time-travel. FastAPI + Redis for sub-ms feature serving."},
    {id:"L2",name:"Model Layer",color:T.purple,
      tiers:["Input Routing: Feature Fetch Broker (API to L1) | Tuning Matrix Client (5D param lookup) | Axis Router","5 Axis Engines: Transaction | Account | Client | Product & Services | Network","Derived Features: NLP Text Engine (spaCy+HuggingFace, MT103 fields 70/72) | Temporal Sequence (deposit-wire chains) | Relationship Graph (Neo4j, UBO links) | Ops Intel Feed (branch observations)","4 Model Types: Rule Engine (closeness-to-threshold) | Hybrid Engine (rules+ML+NLP) | ML/AI Engine (graph analytics, micro-networks) | Anomaly Engine (AE/VAE, reconstruction loss)","Occurrence Qualification: Threshold Evaluator (ATL/BTL via Tuning Matrix) | Occurrence Scorer (normalized 0-1)","Signal Consolidation: Recurrence Validator (sliding window) | Entity Roll-Up Engine (Txn→Acct/Client/Product)","Output: Signal Payload Builder (full lineage JSON) | Explainability Mapper (SHAP + rule traces)"],
      desc:"Most complex layer — features become risk signals. 5 evaluation axes, 4 model types, derived feature engines (NLP, temporal, graph, ops intel). Scores based on closeness-to-threshold from Global Tuning Matrix."},
    {id:"L3",name:"Signal Aggregator",color:T.teal,
      tiers:["Signal Ingestion: Targeted Signal Receiver (ATL+BTL from L2) | Anomaly Score Receiver (AE/VAE outputs) | BTL Vault Writer","Entity Mapping: Entity Resolution Engine (Zingg/Splink probabilistic matching) | Hierarchy Mapper (Country→Client normalization)","Aggregation: Signal Inventory Manager (per-entity typology store) | ATL-Only Score Engine | Anomaly Integrator (dual-view: targeted + unknown)","Lineage: Driver Consolidator | ATL/BTL Data Vault (full payload persistence) | Lineage Tracker (signal→occurrence→txn golden thread)","Output: Entity Risk Matrix (entity key + targeted risk array + ATL score + anomaly score + traceability object)"],
      desc:"Bridges individual signals to entity-level risk profile. Entity Resolution (Zingg/Splink) links signals across accounts. ATL-Only scoring keeps BTL from diluting primary scores. Complete golden thread lineage."},
    {id:"L4",name:"Risk Appetite",color:T.red,
      tiers:["Input: Entity Risk Matrix (from L3) + Risk Appetite Matrix (zero-tolerance policies)","Escalation Router: routes to Track A or Track B based on signal classification","Track A — Deterministic: Policy Matcher (zero-tolerance catalogue) → Auto-Escalator → immediate ATL Alert","Track B — Probabilistic: ML Classifier (XGBoost, historical outcomes) → Threshold Gate → Network Graph ATL/BTL (fund flow topology)","Interactive Learning: Historical Context Engine (client-counterparty-typology triad lookup) | Score Adjustment Engine (FP dampening + TP boosting)","Final Classification: ATL Alert→L5 | BTL→Sampling Pool | Decision Payload Builder (disposition + track + priority + golden thread)"],
      desc:"Final decisioning. Track A: deterministic auto-escalation for zero-tolerance hits (sanctions, TF). Track B: holistic ML evaluation of full signal portfolio. Interactive learning adjusts scores based on historical investigation outcomes."},
    {id:"L5",name:"Alerts + Feedback + Sandbox",color:T.orange,
      tiers:["Alerts Packaging: Alert Template Engine (typology-specific) | Alert Object Builder (3-level: exec summary, typology detail, zero-day anomaly) | API Distribution Gateway (Kong/Envoy + Celery)","Distribution: Case Mgmt (ATL) | Sampling Pool (BTL) | Simulation UI | Analyst UI | Smart Sampling Ranking","Feedback Loop: Ground Truth Ingestor (Kafka CDC) | Feature Analyzer (SHAP) | Threshold Optimizer (Bayesian/Optuna) | BTL Sample Reviewer | ML Retrainer (MLflow+Airflow) | Recommendation Engine","Simulation Sandbox: Config Override Manager | Mirror Execution Engine (L1→L5 on prod data, isolated Spark) | Shadow Alert Store (Delta Lake) | What-If Comparator"],
      desc:"Outbound distribution, closed-loop optimization, and testing. 3-level alert hierarchy. Smart BTL sampling by threshold proximity. Bayesian threshold optimization. Full mirror execution sandbox for what-if analysis."},
    {id:"GTM",name:"Global Tuning Matrix",color:T.gold,
      tiers:["5 Core Dimensions: Country/Jurisdiction | Client Type | Product Type | Risk Level | Transaction Profile (extensible)","Parameter Injection: local thresholds, expected amounts, currency limits, recurrence counts — plugged into model formulas at runtime","Logic Calibration: global model code + localized sensitivity. Same algorithm everywhere, matrix returns jurisdiction-specific values","Runtime Flow: Model requests params (dimensional query) → Matrix resolves (lookup + fallback) → Params injected → localized scoring","Consumers: L2 models (primary) | L4 risk appetite (escalation thresholds) | Feedback loop (writes back optimized params)"],
      desc:"Cross-layer configuration engine making the framework jurisdiction-agnostic. 5D parameter store. Models query at runtime for localized thresholds. New jurisdictions onboarded by populating matrix rows — zero code changes."},
  ];
  const active=activeLayer!==null?layers[activeLayer]:null;
  return(
    <div>
      <div style={{display:"flex",gap:4,marginBottom:16,flexWrap:"wrap"}}>
        {layers.map((l,i)=>(
          <button key={i} onClick={()=>setActiveLayer(activeLayer===i?null:i)} style={{
            flex:1,minWidth:100,padding:"12px 8px",borderRadius:10,
            border:`1px solid ${activeLayer===i?l.color+"60":T.border}`,
            background:activeLayer===i?l.color+"10":T.card,cursor:"pointer",
          }}>
            <div style={{fontFamily:font.mono,fontSize:10,color:l.color,fontWeight:700}}>{l.id}</div>
            <div style={{fontFamily:font.body,fontSize:10,color:activeLayer===i?T.text:T.sub,fontWeight:500,marginTop:2}}>{l.name}</div>
          </button>
        ))}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:3,padding:"8px 0",marginBottom:16}}>
        {layers.slice(0,5).map((l,i)=>(
          <React.Fragment key={i}>
            <div style={{flex:1,height:3,borderRadius:2,background:activeLayer!==null&&activeLayer>=i?l.color:T.border,transition:"background .3s"}}/>
            {i<4&&<div style={{color:T.muted,fontSize:8}}>›</div>}
          </React.Fragment>
        ))}
      </div>
      {active&&(
        <div style={{background:T.card,borderRadius:14,border:`1px solid ${active.color}25`,overflow:"hidden"}}>
          <div style={{padding:"16px 20px",background:active.color+"08",borderBottom:`1px solid ${active.color}15`}}>
            <div style={{fontFamily:font.mono,fontSize:16,fontWeight:700,color:active.color}}>{active.id}: {active.name}</div>
            <div style={{fontFamily:font.body,fontSize:12,color:T.sub,lineHeight:1.7,marginTop:6}}>{active.desc}</div>
          </div>
          <div style={{padding:"16px 20px"}}>
            {active.tiers.map((tier,i)=>{
              const[label,...rest]=tier.split(":");
              return(
                <div key={i} style={{padding:"10px 14px",marginBottom:6,background:T.panel,borderRadius:8,borderLeft:`3px solid ${active.color}40`}}>
                  <span style={{fontFamily:font.mono,fontSize:10,color:active.color,fontWeight:600}}>{label}:</span>
                  <span style={{fontFamily:font.mono,fontSize:10,color:T.sub,marginLeft:4}}>{rest.join(":")}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}
      {!active&&<div style={{textAlign:"center",padding:40,color:T.muted,fontFamily:font.body,fontSize:14}}>Click a layer above to explore its components (based on C4 Level 3 diagrams D3-D8)</div>}
    </div>
  );
}

// ═════════════ TYPOLOGY CATALOGUE ═════════════
function TypologyCatalogue(){
  const[search,setSearch]=useState("");
  const[groupFilter,setGroupFilter]=useState("All");
  const[axisFilter,setAxisFilter]=useState("All");
  const[selected,setSelected]=useState(null);
  const groups=["All",...new Set(TYPOLOGIES.map(t=>t.group))];
  const axes=["All","Transaction","Account","Client","Network","Product & Services"];
  const axisColor=a=>a==="Transaction"?T.blue:a==="Account"?T.teal:a==="Client"?T.gold:a==="Network"?T.purple:a==="Product & Services"?T.orange:T.sub;
  const riskColor=r=>r==="Critical"?T.red:r==="High"?T.orange:r==="Medium"?T.gold:T.accent;
  const filtered=TYPOLOGIES.filter(t=>(groupFilter==="All"||t.group===groupFilter)&&(axisFilter==="All"||t.axis===axisFilter)&&(search===""||t.name.toLowerCase().includes(search.toLowerCase())||t.id.toLowerCase().includes(search.toLowerCase())));
  return(
    <div>
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search typologies..." style={{flex:1,minWidth:200,padding:"10px 16px",borderRadius:10,border:`1px solid ${T.border}`,background:T.panel,color:T.text,fontFamily:font.mono,fontSize:12,outline:"none"}}/>
        <select value={groupFilter} onChange={e=>setGroupFilter(e.target.value)} style={{padding:"10px 12px",borderRadius:10,border:`1px solid ${T.border}`,background:T.panel,color:T.text,fontFamily:font.mono,fontSize:11}}>{groups.map(g=><option key={g}>{g}</option>)}</select>
        <select value={axisFilter} onChange={e=>setAxisFilter(e.target.value)} style={{padding:"10px 12px",borderRadius:10,border:`1px solid ${T.border}`,background:T.panel,color:T.text,fontFamily:font.mono,fontSize:11}}>{axes.map(a=><option key={a}>{a}</option>)}</select>
      </div>
      <div style={{fontFamily:font.mono,fontSize:11,color:T.muted,marginBottom:12}}>{filtered.length} typologies</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {filtered.map((t,i)=>(
          <div key={i} onClick={()=>setSelected(selected===i?null:i)} style={{padding:14,background:selected===i?T.cardHover:T.card,borderRadius:12,border:`1px solid ${selected===i?axisColor(t.axis)+"40":T.border}`,cursor:"pointer",transition:"all .2s"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
              <div><span style={{fontFamily:font.mono,fontSize:10,color:axisColor(t.axis),fontWeight:700}}>{t.id}</span><div style={{fontFamily:font.body,fontSize:13,color:T.text,fontWeight:500,marginTop:1}}>{t.name}</div></div>
              <Badge text={t.risk} color={riskColor(t.risk)}/>
            </div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}><Badge text={t.axis} color={axisColor(t.axis)}/><Badge text={t.method} color={T.muted}/></div>
            {selected===i&&<div style={{marginTop:8,padding:"8px 12px",background:T.panel,borderRadius:8,fontFamily:font.body,fontSize:11,color:T.sub,lineHeight:1.7}}>{t.desc}</div>}
          </div>
        ))}
      </div>
    </div>
  );
}

          <div style={{fontFamily:font.mono,fontSize:8,color:T.muted}}>Architecture: D2-D8</div>
          <div style={{fontFamily:font.mono,fontSize:8,color:T.muted}}>5 Layers + GTM + Feedback</div>
        </div>
      </div>
      <div style={{flex:1,overflow:"auto"}}>
        <div style={{padding:"20px 28px",borderBottom:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontFamily:font.body,fontSize:18,fontWeight:700,color:T.text}}>{titles[page]}</div>
            <div style={{fontFamily:font.mono,fontSize:10,color:T.muted,marginTop:2}}>{subtitles[page]}</div>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:T.success}}/>
            <span style={{fontFamily:font.mono,fontSize:9,color:T.success}}>System Online</span>
          </div>
        </div>
        <div style={{padding:"20px 28px"}}>
          {page==="dashboard"&&<Dashboard/>}
          {page==="scoring"&&<ScoringSimulator/>}
          {page==="architecture"&&<Architecture/>}
          {page==="typologies"&&<TypologyCatalogue/>}
          {page==="investigation"&&<Investigation/>}
          {page==="edgecases"&&<EdgeCases/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
