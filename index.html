<!DOCTYPE html>
<html lang="en">
<head>

    ::-webkit-scrollbar-track { background: #06080c; }

    button:hover { filter: brightness(1.1); }

    input::placeholder { color: #555b75; }

</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
const { useState, useEffect, useRef } = React;

const font = { mono: "'JetBrains Mono', 'IBM Plex Mono', monospace", body: "'Outfit', 'DM Sans', system-ui, sans-serif" };

// ═══════════════════════════════════════════════
// UI COMPONENTS
// ═══════════════════════════════════════════════
const Badge = ({ text, color = T.accent }) => (
  <span style={{ fontFamily: font.mono, fontSize: 10, color, background: color + "18", padding: "3px 10px", borderRadius: 20, border: `1px solid ${color}30`, letterSpacing: 0.3, whiteSpace: "nowrap" }}>{text}</span>
);

const Metric = ({ label, value, color = T.accent, sub: subtitle, trend }) => (
  <div style={{ padding: "16px 20px", background: T.card, borderRadius: 12, border: `1px solid ${T.border}`, flex: 1, minWidth: 140 }}>
    <div style={{ fontFamily: font.mono, fontSize: 10, color: T.muted, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 8 }}>{label}</div>
    <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
      <span style={{ fontFamily: font.mono, fontSize: 28, fontWeight: 700, color }}>{value}</span>
      {trend && <span style={{ fontFamily: font.mono, fontSize: 11, color: trend > 0 ? T.red : T.success }}>{trend > 0 ? "+" : ""}{trend}%</span>}
    </div>
    {subtitle && <div style={{ fontFamily: font.mono, fontSize: 10, color: T.muted, marginTop: 4 }}>{subtitle}</div>}
  </div>
);

const ScoreGauge = ({ label, score, color, delay = 0 }) => {
  const [anim, setAnim] = useState(0);
  useEffect(() => { const t = setTimeout(() => setAnim(score), 200 + delay); return () => clearTimeout(t); }, [score, delay]);
  const pct = Math.round(anim * 100);
  return (
    <div style={{ textAlign: "center" }}>
      <svg width="90" height="90" viewBox="0 0 90 90">
        <circle cx="45" cy="45" r="38" fill="none" stroke={T.border} strokeWidth="5" />
        <circle cx="45" cy="45" r="38" fill="none" stroke={color} strokeWidth="5"
          strokeDasharray={`${anim * 238.76} 238.76`} strokeLinecap="round"
          transform="rotate(-90 45 45)" style={{ transition: "stroke-dasharray 1.2s cubic-bezier(0.4,0,0.2,1)" }} />
        <text x="45" y="42" textAnchor="middle" fill={color} fontFamily={font.mono} fontSize="18" fontWeight="700">{pct}</text>
        <text x="45" y="56" textAnchor="middle" fill={T.muted} fontFamily={font.mono} fontSize="8">/ 100</text>
      </svg>
      <div style={{ fontFamily: font.mono, fontSize: 10, color: T.sub, marginTop: 4, letterSpacing: 0.5 }}>{label}</div>
    </div>
  );
};

const ProgressBar = ({ value, color, height = 6 }) => (
  <div style={{ background: T.border, borderRadius: height, height, overflow: "hidden", flex: 1 }}>
    <div style={{ width: `${value * 100}%`, height: "100%", background: color, borderRadius: height, transition: "width 0.8s ease" }} />
  </div>
);

const Tab = ({ items, active, onChange }) => (
  <div style={{ display: "flex", gap: 2, background: T.panel, borderRadius: 10, padding: 3, marginBottom: 20 }}>
    {items.map((item, i) => (
      <button key={i} onClick={() => onChange(i)} style={{
        flex: 1, padding: "8px 12px", borderRadius: 8, border: "none", cursor: "pointer",
        background: active === i ? T.card : "transparent",
        color: active === i ? T.accent : T.muted,
        fontFamily: font.mono, fontSize: 11, fontWeight: active === i ? 600 : 400,
        transition: "all 0.2s",
      }}>{item}</button>
    ))}
  </div>
);

// ═══════════════════════════════════════════════
// SECTION: DASHBOARD
// ═══════════════════════════════════════════════
function Dashboard() {
  const [tick, setTick] = useState(0);
  useEffect(() => { const i = setInterval(() => setTick(t => t + 1), 3000); return () => clearInterval(i); }, []);

  return (
    <div>
      <div style={{ display: "flex", gap: 12, marginBottom: 20, flexWrap: "wrap" }}>
        <Metric label="Active Alerts" value="127" color={T.red} sub="23 critical" trend={12} />
        <Metric label="Today's Transactions" value="84.2K" color={T.blue} sub="$2.1B volume" trend={-3} />
        <Metric label="SAR Conversion" value="34%" color={T.gold} sub="vs 5% industry avg" trend={8} />

      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 20 }}>
        {/* Live Alert Feed */}
        <div style={{ background: T.card, borderRadius: 14, border: `1px solid ${T.border}`, overflow: "hidden" }}>

              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontFamily: font.body, fontSize: 13, color: T.text, fontWeight: 500, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{a.entity}</div>
                <div style={{ fontFamily: font.mono, fontSize: 10, color: T.muted, marginTop: 2 }}>{a.type}</div>

              <div style={{ textAlign: "right", flexShrink: 0 }}>
                <Badge text={a.status} color={a.status === "Escalated" ? T.red : a.status === "Under Review" ? T.gold : T.blue} />
                <div style={{ fontFamily: font.mono, fontSize: 9, color: T.muted, marginTop: 4 }}>{a.age} ago</div>
              </div>
            </div>
          ))}
        </div>

        {/* System Health */}
        <div style={{ background: T.card, borderRadius: 14, border: `1px solid ${T.border}`, padding: 20 }}>
          <div style={{ fontFamily: font.mono, fontSize: 12, color: T.text, fontWeight: 600, marginBottom: 16 }}>System Health</div>
          {[
            { label: "Feature Factory", status: "Healthy", latency: "12ms", throughput: "14.2K/s", color: T.success },
            { label: "Model Layer (L2)", status: "Healthy", latency: "67ms", throughput: "8.4K/s", color: T.success },
            { label: "Signal Aggregator (L3)", status: "Warning", latency: "142ms", throughput: "5.1K/s", color: T.warn },
            { label: "Risk Appetite (L4)", status: "Healthy", latency: "23ms", throughput: "2.8K/s", color: T.success },
            { label: "Alert Packaging (L5)", status: "Healthy", latency: "45ms", throughput: "890/s", color: T.success },
            { label: "Graph RAG", status: "Healthy", latency: "340ms", throughput: "120/s", color: T.success },
            { label: "Neo4j Graph DB", status: "Healthy", latency: "8ms", throughput: "50M nodes", color: T.success },
          ].map((s, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderBottom: i < 6 ? `1px solid ${T.border}08` : "none" }}>

              <span style={{ fontFamily: font.mono, fontSize: 11, color: T.sub, flex: 1 }}>{s.label}</span>
              <span style={{ fontFamily: font.mono, fontSize: 10, color: T.muted }}>{s.latency}</span>
              <span style={{ fontFamily: font.mono, fontSize: 10, color: s.color }}>{s.status}</span>

      {/* FP Reduction Chart */}
      <div style={{ background: T.card, borderRadius: 14, border: `1px solid ${T.border}`, padding: 20 }}>
        <div style={{ fontFamily: font.mono, fontSize: 12, color: T.text, fontWeight: 600, marginBottom: 16 }}>False Positive Reduction Pipeline</div>
        <div style={{ display: "flex", alignItems: "flex-end", gap: 6, height: 140, padding: "0 10px" }}>
          {[
            { label: "Rule-Based", rate: 97, color: T.red },
            { label: "+ML Scoring", rate: 72, color: T.orange },
            { label: "+GNN Network", rate: 48, color: T.gold },
            { label: "+Cross-Signal", rate: 35, color: T.blue },
            { label: "+Peer Calibrate", rate: 28, color: T.purple },
            { label: "Final System", rate: 22, color: T.accent },
          ].map((b, i) => (
            <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
              <span style={{ fontFamily: font.mono, fontSize: 13, fontWeight: 700, color: b.color }}>{b.rate}%</span>
              <div style={{ width: "100%", height: `${b.rate * 1.2}px`, background: `linear-gradient(180deg, ${b.color}, ${b.color}40)`, borderRadius: "6px 6px 0 0", transition: "height 1s ease" }} />
              <span style={{ fontFamily: font.mono, fontSize: 8, color: T.muted, textAlign: "center", lineHeight: 1.2 }}>{b.label}</span>

}

// ═══════════════════════════════════════════════
// SECTION: SCORING SIMULATOR
// ═══════════════════════════════════════════════
function ScoringSimulator() {
  const [scenario, setScenario] = useState("suspicious");
  const [running, setRunning] = useState(false);
  const [stage, setStage] = useState(-1);
  const [optionA, setOptionA] = useState(false);
  const s = SCORING_SCENARIOS[scenario];

  const stages = scenario === "suspicious" ? [
    { name: "Feature Extraction", layer: "L1", time: "12ms", detail: "Extracted 247 features: amount=$9,500 (structuring_proximity=0.95), country=PA (HRG=true), entity_age=21d, UBO_sanctions_hops=1" },
    { name: "Transaction Axis", layer: "L2", scores: [{ typ: "RT#11 HRG", score: 0.92 }, { typ: "RT#24 Round", score: 0.55 }, { typ: "RT#26 Structuring", score: 0.88 }], time: "34ms" },
    { name: "Account Axis", layer: "L2", scores: [{ typ: "RT#21 vs History", score: 0.78 }, { typ: "RT#25 Rapid Movement", score: 0.82 }], time: "41ms" },
    { name: "Client Axis", layer: "L2", scores: [{ typ: "RT#19 New Entity", score: 0.90 }, { typ: "RT#22 vs Profile", score: 0.72 }], time: "28ms" },
    { name: "Network Axis (GNN)", layer: "L2", scores: [{ typ: "RT#41 Many-to-One", score: 0.85 }, { typ: "RT#43 Shared Info", score: 0.94 }], time: "76ms" },
    { name: "Cross-Signal Enrichment", layer: "L2.5", detail: optionA ? "SKIPPED (Option A: no enrichment layer)" : "Cross-typology boost: RT#22 0.72→0.91 (corroborated by RT#11+RT#19+RT#43). Weak signal combo: RT#24 0.55 preserved. Network enrichment: shell_cluster=true tagged on all scores.", time: "52ms" },
    { name: "Aggregation", layer: "L3", detail: optionA ? "Threshold-first: RT#24 (0.55) DROPPED below 0.65 threshold. 8 signals remain." : "Aggregate-first: all 9 signals preserved. MAX for dormancy, SUM for structuring, JOINT for TF. Aggregated client score: 0.94", time: "18ms" },
    { name: "Risk Appetite", layer: "L4", detail: "Track A: No auto-escalate triggers (no exact sanctions match). Track B: ML classifier → P(TP) = 0.91. Combined score: 0.94. Decision: ATL (Above The Line).", time: "23ms" },
    { name: "Alert Generated", layer: "L5", detail: "Alert ALT-47291 created. 5-level package assembled. Graph RAG context injected. Routed to investigator queue. Priority: CRITICAL." },
  ] : [
    { name: "Feature Extraction", layer: "L1", time: "12ms", detail: "Extracted 247 features: amount=$25,000 (normal range), country=DE (low risk), entity_age=15y, public_company=true" },
    { name: "Transaction Axis", layer: "L2", scores: [{ typ: "RT#11 HRG", score: 0.02 }, { typ: "RT#24 Round", score: 0.15 }, { typ: "RT#26 Structuring", score: 0.01 }], time: "34ms" },
    { name: "Account Axis", layer: "L2", scores: [{ typ: "RT#21 vs History", score: 0.05 }, { typ: "RT#25 Rapid Movement", score: 0.03 }], time: "41ms" },
    { name: "Client Axis", layer: "L2", scores: [{ typ: "RT#22 vs Profile", score: 0.08 }], time: "28ms" },
    { name: "Network Axis (GNN)", layer: "L2", scores: [{ typ: "RT#41 Many-to-One", score: 0.01 }, { typ: "RT#43 Shared Info", score: 0.02 }], time: "76ms" },
    { name: "Cross-Signal Enrichment", layer: "L2.5", detail: "No signals above weak band (0.40). No enrichment needed. All scores pass through unchanged.", time: "8ms" },
    { name: "Aggregation", layer: "L3", detail: "All scores below noise floor (0.25). Aggregated client score: 0.08. Decision: BTL.", time: "12ms" },
    { name: "No Alert", layer: "L4", detail: "Score 0.08 well below ATL threshold. No alert generated. Transaction logged for audit trail. BTL sampling eligible." },
  ];

  const runSimulation = () => { setStage(-1); setRunning(true); let i = 0; const t = setInterval(() => { setStage(i); i++; if (i >= stages.length) { clearInterval(t); setRunning(false); } }, 600); };

  const layerColor = l => l === "L1" ? T.gold : l === "L2" ? T.purple : l === "L2.5" ? T.accent : l === "L3" ? T.gold : l === "L4" ? T.red : T.orange;

  return (
    <div>
      {/* Controls */}
      <div style={{ display: "flex", gap: 12, marginBottom: 20, flexWrap: "wrap" }}>
        <div style={{ display: "flex", gap: 4, background: T.panel, borderRadius: 10, padding: 3 }}>
          <button onClick={() => { setScenario("suspicious"); setStage(-1); }} style={{ padding: "8px 16px", borderRadius: 8, border: "none", cursor: "pointer", background: scenario === "suspicious" ? T.red + "20" : "transparent", color: scenario === "suspicious" ? T.red : T.muted, fontFamily: font.mono, fontSize: 11, fontWeight: 600 }}>Suspicious Transaction</button>
          <button onClick={() => { setScenario("clean"); setStage(-1); }} style={{ padding: "8px 16px", borderRadius: 8, border: "none", cursor: "pointer", background: scenario === "clean" ? T.accent + "20" : "transparent", color: scenario === "clean" ? T.accent : T.muted, fontFamily: font.mono, fontSize: 11, fontWeight: 600 }}>Clean Transaction</button>
        </div>
        <button onClick={() => setOptionA(!optionA)} style={{ padding: "8px 16px", borderRadius: 8, border: `1px solid ${optionA ? T.red : T.accent}40`, background: "transparent", cursor: "pointer", color: optionA ? T.red : T.accent, fontFamily: font.mono, fontSize: 11, fontWeight: 600 }}>
          {optionA ? "Option A (Current — No L2.5)" : "Option B (Recommended — With L2.5)"}
        </button>
        <button onClick={runSimulation} disabled={running} style={{ padding: "8px 24px", borderRadius: 8, border: "none", cursor: running ? "default" : "pointer", background: running ? T.muted : T.accent, color: T.bg, fontFamily: font.mono, fontSize: 12, fontWeight: 700, opacity: running ? 0.5 : 1, marginLeft: "auto" }}>
          {running ? "Scoring..." : "Run Scoring Pipeline"}
        </button>
      </div>

      {/* Transaction Card */}
      <div style={{ background: T.card, borderRadius: 14, border: `1px solid ${T.border}`, padding: 20, marginBottom: 20 }}>
        <div style={{ fontFamily: font.mono, fontSize: 10, color: T.muted, letterSpacing: 1.5, marginBottom: 12 }}>INPUT TRANSACTION</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12 }}>
          {[
            { label: "Amount", value: `$${s.amount.toLocaleString()}` },
            { label: "From", value: s.from },
            { label: "To", value: s.to },
            { label: "Origin", value: s.fromCountry },
            { label: "Destination", value: s.toCountry },
            { label: "Product", value: s.product },
            { label: "Frequency", value: s.frequency },
            { label: "Client Age", value: s.clientAge },
          ].map((f, i) => (
            <div key={i}>
              <div style={{ fontFamily: font.mono, fontSize: 9, color: T.muted, marginBottom: 2, letterSpacing: 0.5 }}>{f.label}</div>
              <div style={{ fontFamily: font.mono, fontSize: 12, color: T.text }}>{f.value}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Pipeline Stages */}
      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
        {stages.map((st, i) => {
          const active = i <= stage;
          const current = i === stage;
          const lc = layerColor(st.layer);
          return (
            <div key={i} style={{ background: active ? T.card : T.panel, borderRadius: 12, border: `1px solid ${current ? lc + "60" : T.border}`, padding: active ? "16px 20px" : "10px 20px", transition: "all 0.4s ease", opacity: active ? 1 : 0.4 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{ width: 28, height: 28, borderRadius: 8, background: active ? lc + "20" : T.border, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: font.mono, fontSize: 11, fontWeight: 700, color: active ? lc : T.muted, flexShrink: 0, transition: "all 0.3s" }}>{i + 1}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontFamily: font.mono, fontSize: 13, color: active ? T.text : T.muted, fontWeight: 600 }}>{st.name}</span>
                    <Badge text={st.layer} color={lc} />
                    {st.time && active && <span style={{ fontFamily: font.mono, fontSize: 10, color: T.muted }}>{st.time}</span>}
                  </div>
                </div>
                {active && <div style={{ width: 10, height: 10, borderRadius: "50%", background: current ? lc : T.success }} />}
              </div>

              {active && st.scores && (
                <div style={{ display: "flex", gap: 8, marginTop: 12, flexWrap: "wrap" }}>
                  {st.scores.map((sc, j) => {
                    const dropped = optionA && sc.score < 0.65 && i > 4;
                    return (
                      <div key={j} style={{ padding: "6px 12px", background: dropped ? T.redDim : sc.score > 0.8 ? T.red + "12" : sc.score > 0.5 ? T.gold + "12" : T.accent + "08", borderRadius: 8, border: `1px solid ${dropped ? T.red : sc.score > 0.8 ? T.red : sc.score > 0.5 ? T.gold : T.accent}20`, display: "flex", alignItems: "center", gap: 8, textDecoration: dropped ? "line-through" : "none", opacity: dropped ? 0.5 : 1 }}>
                        <span style={{ fontFamily: font.mono, fontSize: 10, color: T.sub }}>{sc.typ}</span>
                        <span style={{ fontFamily: font.mono, fontSize: 13, fontWeight: 700, color: sc.score > 0.8 ? T.red : sc.score > 0.5 ? T.gold : T.accent }}>{sc.score.toFixed(2)}</span>
                      </div>
                    );
                  })}
                </div>
              )}

              {active && st.detail && (
                <div style={{ marginTop: 10, padding: "10px 14px", background: T.panel, borderRadius: 8, fontFamily: font.mono, fontSize: 11, color: T.sub, lineHeight: 1.7 }}>
                  {st.detail}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Score Gauges */}
      {stage >= stages.length - 1 && (
        <div style={{ marginTop: 20, padding: 20, background: scenario === "suspicious" ? T.redDim : T.accentDim, borderRadius: 14, border: `1px solid ${scenario === "suspicious" ? T.red : T.accent}30` }}>
          <div style={{ display: "flex", justifyContent: "center", gap: 24, flexWrap: "wrap" }}>
            {scenario === "suspicious" ? (
              <>
                <ScoreGauge label="Transaction" score={0.92} color={T.red} delay={0} />
                <ScoreGauge label="Account" score={0.82} color={T.orange} delay={200} />
                <ScoreGauge label="Client" score={0.90} color={T.gold} delay={400} />
                <ScoreGauge label="Network" score={0.94} color={T.purple} delay={600} />
                <ScoreGauge label="FINAL" score={0.94} color={T.red} delay={800} />
              </>
            ) : (
              <>
                <ScoreGauge label="Transaction" score={0.02} color={T.accent} delay={0} />
                <ScoreGauge label="Account" score={0.05} color={T.accent} delay={200} />
                <ScoreGauge label="Client" score={0.08} color={T.accent} delay={400} />
                <ScoreGauge label="Network" score={0.02} color={T.accent} delay={600} />
                <ScoreGauge label="FINAL" score={0.08} color={T.accent} delay={800} />
              </>
            )}
          </div>
          <div style={{ textAlign: "center", marginTop: 16, fontFamily: font.mono, fontSize: 16, fontWeight: 700, color: scenario === "suspicious" ? T.red : T.accent }}>
            {scenario === "suspicious" ? "ALERT GENERATED — Priority: CRITICAL" : "NO ALERT — Transaction Cleared"}
          </div>
        </div>
      )}
    </div>
  );
}

// SECTION: TYPOLOGY CATALOGUE
// ═══════════════════════════════════════════════
function TypologyCatalogue() {
  const [search, setSearch] = useState("");
  const [groupFilter, setGroupFilter] = useState("All");
  const [axisFilter, setAxisFilter] = useState("All");
  const [selected, setSelected] = useState(null);

  const groups = ["All", ...new Set(TYPOLOGIES.map(t => t.group))];
  const axes = ["All", "Transaction", "Account", "Client", "Network", "Product"];
  const axisColor = a => a === "Transaction" ? T.blue : a === "Account" ? T.accent : a === "Client" ? T.gold : a === "Network" ? T.purple : a === "Product" ? T.orange : T.sub;
  const riskColor = r => r === "Critical" ? T.red : r === "High" ? T.orange : r === "Medium" ? T.gold : T.accent;

  const filtered = TYPOLOGIES.filter(t =>
    (groupFilter === "All" || t.group === groupFilter) &&
    (axisFilter === "All" || t.axis === axisFilter) &&
    (search === "" || t.name.toLowerCase().includes(search.toLowerCase()) || t.id.toLowerCase().includes(search.toLowerCase()))
  );

  return (
    <div>
      {/* Filters */}
      <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search typologies..." style={{ flex: 1, minWidth: 200, padding: "10px 16px", borderRadius: 10, border: `1px solid ${T.border}`, background: T.panel, color: T.text, fontFamily: font.mono, fontSize: 12, outline: "none" }} />
        <select value={groupFilter} onChange={e => setGroupFilter(e.target.value)} style={{ padding: "10px 12px", borderRadius: 10, border: `1px solid ${T.border}`, background: T.panel, color: T.text, fontFamily: font.mono, fontSize: 11 }}>
          {groups.map(g => <option key={g} value={g}>{g}</option>)}
        </select>
        <select value={axisFilter} onChange={e => setAxisFilter(e.target.value)} style={{ padding: "10px 12px", borderRadius: 10, border: `1px solid ${T.border}`, background: T.panel, color: T.text, fontFamily: font.mono, fontSize: 11 }}>
          {axes.map(a => <option key={a} value={a}>{a}</option>)}
        </select>
      </div>

      <div style={{ fontFamily: font.mono, fontSize: 11, color: T.muted, marginBottom: 12 }}>{filtered.length} typologies found</div>

      {/* Grid */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        {filtered.map((t, i) => (
          <div key={i} onClick={() => setSelected(selected === i ? null : i)} style={{ padding: 16, background: selected === i ? T.cardHover : T.card, borderRadius: 12, border: `1px solid ${selected === i ? axisColor(t.axis) + "40" : T.border}`, cursor: "pointer", transition: "all 0.2s" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
              <div>
                <span style={{ fontFamily: font.mono, fontSize: 11, color: axisColor(t.axis), fontWeight: 700 }}>{t.id}</span>
                <div style={{ fontFamily: font.body, fontSize: 14, color: T.text, fontWeight: 500, marginTop: 2 }}>{t.name}</div>
              </div>
              <Badge text={t.risk} color={riskColor(t.risk)} />
            </div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: selected === i ? 10 : 0 }}>
              <Badge text={t.axis} color={axisColor(t.axis)} />
              <Badge text={t.method} color={T.muted} />
              <Badge text={t.group.split(" ")[0]} color={T.muted} />
            </div>
            {selected === i && (
              <div style={{ marginTop: 8, padding: "10px 14px", background: T.panel, borderRadius: 8, fontFamily: font.body, fontSize: 12, color: T.sub, lineHeight: 1.7 }}>{t.desc}</div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

    { id: "L5", name: "Alert & Investigation", color: T.orange, modules: ["Alert Packaging (5-level)", "De-duplication Engine", "Graph RAG", "Text RAG", "Adverse Media NLP", "AI Disposition (3-agent)", "SAR Auto-Population", "QA/QC Engine"], desc: "Builds typology-specific alert packages. RAG-enriched investigation context. Multi-agent disposition. SAR drafting. Skill-based routing." },
  ];

  return (
    <div>
      <div style={{ display: "flex", gap: 6, marginBottom: 20 }}>
        {layers.map((l, i) => (
          <button key={i} onClick={() => setActiveLayer(activeLayer === i ? null : i)} style={{
            flex: 1, padding: "14px 8px", borderRadius: 12,
            border: `1px solid ${activeLayer === i ? l.color + "60" : T.border}`,
            background: activeLayer === i ? l.color + "10" : T.card,

          }}>

      <div style={{ display: "flex", alignItems: "center", gap: 4, padding: "12px 0", marginBottom: 20 }}>
        {layers.map((l, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 4, flex: 1 }}>

          </div>
        ))}
      </div>

      {activeLayer !== null && (
        <div style={{ background: T.card, borderRadius: 14, border: `1px solid ${layers[activeLayer].color}25`, padding: 20, transition: "all 0.3s" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
            <span style={{ fontFamily: font.mono, fontSize: 18, fontWeight: 700, color: layers[activeLayer].color }}>{layers[activeLayer].id}</span>
            <span style={{ fontFamily: font.body, fontSize: 18, fontWeight: 600, color: T.text }}>{layers[activeLayer].name}</span>
          </div>
          <div style={{ fontFamily: font.body, fontSize: 13, color: T.sub, lineHeight: 1.8, marginBottom: 16 }}>{layers[activeLayer].desc}</div>

          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            {layers[activeLayer].modules.map((m, i) => (
              <div key={i} style={{ padding: "8px 14px", background: layers[activeLayer].color + "10", borderRadius: 8, border: `1px solid ${layers[activeLayer].color}20`, fontFamily: font.mono, fontSize: 11, color: layers[activeLayer].color }}>{m}</div>
            ))}
          </div>
        </div>
      )}

      {activeLayer === null && (
        <div style={{ textAlign: "center", padding: 40, color: T.muted, fontFamily: font.body, fontSize: 14 }}>Click a layer above to explore its modules and architecture details</div>
      )}
    </div>
  );
}

function EdgeCases() {
  const [selected, setSelected] = useState(0);
  const cases = [
    { name: "Valley of Death", color: T.red, problem: "5 weak signals (0.55-0.63) each below 0.65 threshold. ALL discarded before aggregation. Zero alerts for a client with 5 converging red flags.", fix: "Pre-threshold weak signal combiner: if 3+ typologies score in the 0.40-0.65 band for the same entity, generate a synthetic Multi-Signal Convergence score.", beforeScore: "0 alerts", afterScore: "Alert: 0.87" },
    { name: "Model Isolation", color: T.purple, problem: "RT#22 scores 0.72 without knowing RT#11 detected North Korea + RT#14 found opaque trust + RT#19 found 3-week-old entity. Corroborating evidence is invisible.", fix: "Cross-typology booster: lightweight model between L2 and L3. When corroborating typologies co-fire, weak scores are boosted.", beforeScore: "RT#22: 0.72", afterScore: "RT#22: 0.91" },
    { name: "Network Blind Spot", color: T.gold, problem: "RT#43 (shared info) classified at Transaction axis. Can only do pairwise checks. Cannot detect: 11/14 counterparties share a registered agent, incorporated in 30-day window.", fix: "Move RT#43 to Network axis (GNN). GraphSAGE extracts full subgraph, runs message passing, detects the shell cluster pattern.", beforeScore: "RT#43: 0.28", afterScore: "RT#43: 0.94" },
    { name: "Recurrence Blind", color: T.blue, problem: "47 wires to 14 shell companies = same recurrence score as 47 wires to 1 established supplier. Structure of breaches is ignored.", fix: "Driver-aware recurrence: counterparty diversity ratio (14/47 = 0.30 vs 1/47 = 0.02) modifies the recurrence multiplier.", beforeScore: "Both: 3.0x", afterScore: "Shells: 4.2x / Supplier: 1.1x" },
    { name: "TF Weak Signals", color: T.red, problem: "RT#81 designed for weak signal combination. But each signal (0.20-0.35) is below threshold. Layer 3 drops all before combination check runs.", fix: "Dedicated TF Combination Path: joint probability P(TF) = f(signal_1, signal_2, ...) computed BEFORE threshold filtering.", beforeScore: "Invisible", afterScore: "TF Score: 0.72" },
    { name: "Timing Gap", color: T.accent, problem: "RT#25 needs to pair $500K deposit at 9:15 AM with $498K wire at 9:47 AM. But features computed in daily batch — pairing can't happen until both land in same batch.", fix: "Transaction pairing in streaming pre-processor: for each outbound, find matching inbound (amount ± tolerance, time window). Paired features available to RT#25 in real-time.", beforeScore: "Not detected", afterScore: "RT#25: 0.88" },
    { name: "Aggregation Dilution", color: T.orange, problem: "RT#23 (dormancy) scores 0.88 on 1 account. AVERAGE across 5 accounts: 0.88/5 = 0.176. Signal mathematically destroyed.", fix: "Mandatory aggregation method per typology: MAX for dormancy (worst account matters), SUM for structuring, JOINT for TF.", beforeScore: "AVG: 0.18", afterScore: "MAX: 0.88" },
  ];
  const c = cases[selected];

  return (
    <div>
      <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginBottom: 20 }}>
        {cases.map((ec, i) => (
          <button key={i} onClick={() => setSelected(i)} style={{
            padding: "8px 14px", borderRadius: 8,
            border: `1px solid ${selected === i ? ec.color + "60" : T.border}`,
            background: selected === i ? ec.color + "10" : "transparent",
            color: selected === i ? ec.color : T.muted,
            fontFamily: font.mono, fontSize: 10, fontWeight: selected === i ? 600 : 400,
            cursor: "pointer",
          }}>{i + 1}. {ec.name}</button>
        ))}
      </div>

      <div style={{ background: T.card, borderRadius: 14, border: `1px solid ${c.color}25`, overflow: "hidden" }}>
        <div style={{ padding: "16px 20px", background: c.color + "08", borderBottom: `1px solid ${c.color}20` }}>
          <div style={{ fontFamily: font.mono, fontSize: 16, fontWeight: 700, color: c.color }}>Edge Case #{selected + 1}: {c.name}</div>
        </div>
        <div style={{ padding: 20 }}>
          <div style={{ fontFamily: font.mono, fontSize: 10, color: T.red, letterSpacing: 1, marginBottom: 6 }}>THE PROBLEM</div>
          <div style={{ fontFamily: font.body, fontSize: 14, color: T.sub, lineHeight: 1.8, marginBottom: 20 }}>{c.problem}</div>

          <div style={{ fontFamily: font.mono, fontSize: 10, color: T.accent, letterSpacing: 1, marginBottom: 6 }}>THE FIX (Layer 2.5)</div>
          <div style={{ fontFamily: font.body, fontSize: 14, color: T.sub, lineHeight: 1.8, marginBottom: 20 }}>{c.fix}</div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <div style={{ padding: 16, background: T.red + "08", borderRadius: 12, border: `1px solid ${T.red}20`, textAlign: "center" }}>
              <div style={{ fontFamily: font.mono, fontSize: 10, color: T.red, letterSpacing: 1, marginBottom: 8 }}>OPTION A (Current)</div>
              <div style={{ fontFamily: font.mono, fontSize: 20, fontWeight: 700, color: T.red }}>{c.beforeScore}</div>
            </div>
            <div style={{ padding: 16, background: T.accent + "08", borderRadius: 12, border: `1px solid ${T.accent}20`, textAlign: "center" }}>
              <div style={{ fontFamily: font.mono, fontSize: 10, color: T.accent, letterSpacing: 1, marginBottom: 8 }}>OPTION B (With L2.5)</div>
              <div style={{ fontFamily: font.mono, fontSize: 20, fontWeight: 700, color: T.accent }}>{c.afterScore}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}
