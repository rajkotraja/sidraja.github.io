<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AML Detection System — Deep Dive</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #060810; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #0c0e18; }
  ::-webkit-scrollbar-thumb { background: #2a2d42; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3d52; }
  button { cursor: pointer; }
  button:focus { outline: none; }
  code { font-family: 'IBM Plex Mono', monospace; }
</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const C = {
  bg: "#060810",
  surface: "#0c0e18",
  card: "#131520",
  border: "#1e2035",
  accent: "#00d4aa",
  accentDim: "#00d4aa18",
  gold: "#f0b840",
  goldDim: "#f0b84018",
  red: "#f05545",
  redDim: "#f0554518",
  blue: "#4d9ef5",
  blueDim: "#4d9ef518",
  purple: "#a06df0",
  purpleDim: "#a06df018",
  orange: "#f08030",
  orangeDim: "#f0803018",
  text: "#dde0f0",
  dim: "#6b708a",
  faint: "#2a2d42",
};

const mono = "'IBM Plex Mono', monospace";
const sans = "'DM Sans', 'Segoe UI', sans-serif";

function Callout({ icon, title, color, children }) {
  return (
    <div style={{ marginTop: 18, padding: "16px 18px", background: color + "10", border: `1px solid ${color}28`, borderRadius: 10 }}>
      <div style={{ fontSize: 13, color, fontFamily: mono, fontWeight: 600, marginBottom: 6 }}>{icon} {title}</div>
      <div style={{ fontSize: 14, color: C.dim, lineHeight: 1.85 }}>{children}</div>
    </div>
  );
}

function Code({ children }) {
  return <div style={{ fontFamily: mono, fontSize: 12, background: "#000", padding: 16, borderRadius: 8, lineHeight: 2.1, overflowX: "auto" }}>{children}</div>;
}

function Tabs({ items, active, onSelect }) {
  return (
    <div style={{ display: "flex", gap: 5, flexWrap: "wrap", marginBottom: 18 }}>
      {items.map((s, i) => (
        <button key={i} onClick={() => onSelect(i)} style={{
          background: active === i ? C.accent : "transparent",
          color: active === i ? C.bg : C.dim,
          border: `1px solid ${active === i ? C.accent : C.border}`,
          borderRadius: 6, padding: "7px 14px", cursor: "pointer",
          fontFamily: mono, fontSize: 11, fontWeight: active === i ? 700 : 400,
          transition: "all 0.15s",
        }}>{s}</button>
      ))}
    </div>
  );
}

function P({ children }) {
  return <p style={{ color: C.dim, lineHeight: 1.85, marginBottom: 18, fontSize: 15 }}>{children}</p>;
}

function B({ children, color = C.text }) {
  return <strong style={{ color }}>{children}</strong>;
}

function Bridge({ from, to, text }) {
  return (
    <div style={{ margin: "0 0 20px", padding: "14px 18px", background: `linear-gradient(135deg, ${C.purpleDim}, ${C.blueDim})`, borderRadius: 10, border: `1px solid ${C.purple}20`, display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
        <span style={{ fontFamily: mono, fontSize: 11, color: C.purple, fontWeight: 600 }}>{from}</span>
        <span style={{ color: C.faint, fontSize: 16 }}>→</span>
        <span style={{ fontFamily: mono, fontSize: 11, color: C.blue, fontWeight: 600 }}>{to}</span>
      </div>
      <div style={{ fontSize: 13, color: C.dim, lineHeight: 1.7 }}>{text}</div>
    </div>
  );
}

function Card({ color, title, children, style: s = {} }) {
  return (
    <div style={{ padding: 16, background: C.card, borderRadius: 10, border: `1px solid ${color}25`, borderLeft: `3px solid ${color}`, ...s }}>
      {title && <div style={{ fontFamily: mono, fontSize: 13, color, fontWeight: 600, marginBottom: 8 }}>{title}</div>}
      <div style={{ color: C.dim, fontSize: 13, lineHeight: 1.75 }}>{children}</div>
    </div>
  );
}

// ═══════════════════════════════════════════
// SECTION 1: THE AML PROBLEM
// ═══════════════════════════════════════════
function Section1() {
  return (
    <div>
      <P>The core idea behind any detection system is simple: extract features from raw data, feed them through a neural network, get a classification. <B color={C.accent}>AML detection follows this same principle</B> — but it's dramatically harder. Let's understand why.</P>

      <div style={{ background: "#000", borderRadius: 10, padding: 20, border: `1px solid ${C.border}`, fontFamily: mono, fontSize: 12, lineHeight: 2, marginBottom: 20 }}>
        <span style={{ color: C.red }}>ALERT #47291</span> <span style={{ color: C.dim }}>— Flagged by Transaction Monitor</span><br />
        <div style={{ borderTop: `1px solid ${C.border}`, margin: "6px 0" }} />
        <span style={{ color: C.gold }}>Account:</span> <span style={{ color: C.text }}>Acme Exports Ltd → 14 shell entities in 3 jurisdictions</span><br />
        <span style={{ color: C.gold }}>Pattern:</span> <span style={{ color: C.text }}>$9,500 × 47 deposits over 12 days (below $10K reporting threshold)</span><br />
        <span style={{ color: C.gold }}>Network:</span> <span style={{ color: C.text }}>Recipient entities share a UBO with sanctioned individual</span><br />
        <span style={{ color: C.gold }}>Typology:</span> <span style={{ color: C.red }}>Structuring + Layering via shell network</span>
      </div>

      <P>Money laundering involves <B>networks of entities transacting over time</B>. A single $9,500 transfer looks normal. But 47 of them, split across 14 entities that trace back to the same person, just below the reporting threshold? That's <B color={C.red}>structuring</B> — a classic laundering technique.</P>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 20 }}>
        <Card color={C.blue} title="Simple Classification">
          <B color={C.text}>One input, one decision.</B> A single data point with self-contained features. Everything you need to decide is in the input itself.
        </Card>
        <Card color={C.red} title="AML Detection">
          <B color={C.text}>Graph + time + context.</B> A single transaction means nothing alone. You need the network of entities, the history, the regulatory context, and the relationship patterns.
        </Card>
      </div>

      <P>This is why AML systems have an infamous <B color={C.red}>95%+ false positive rate</B> in most banks. Rule-based systems flag everything that looks slightly odd. Our goal: build an intelligent system that brings that rate down dramatically using three types of AI:</P>

      <div style={{ display: "grid", gap: 10, marginBottom: 16 }}>
        {[
          { icon: "🧠", name: "Neural Networks", desc: "Score individual transactions and customer behavior using learned patterns", color: C.accent },
          { icon: "🕸️", name: "Graph Neural Networks + Graph RAG", desc: "Detect network-level patterns: shell company webs, circular flows, hidden beneficial owners", color: C.purple },
          { icon: "📚", name: "Traditional RAG", desc: "Give investigators instant access to regulations, past SARs, typology libraries, and compliance rulings", color: C.gold },
        ].map((item, i) => (
          <div key={i} style={{ display: "flex", gap: 14, alignItems: "center", padding: "14px 16px", background: C.card, borderRadius: 10, border: `1px solid ${item.color}20` }}>
            <div style={{ fontSize: 24, flexShrink: 0 }}>{item.icon}</div>
            <div>
              <div style={{ fontFamily: mono, fontSize: 13, color: item.color, fontWeight: 600 }}>{item.name}</div>
              <div style={{ fontSize: 13, color: C.dim, marginTop: 2, lineHeight: 1.6 }}>{item.desc}</div>
            </div>
          </div>
        ))}
      </div>

      <Callout icon="🎯" title="The Architecture We're Building" color={C.accent}>
        <B color={C.text}>Three AI systems feeding into one scoring engine.</B> The neural network scores individual transactions. The graph system scores entity networks. RAG provides context for investigators. The ensemble combines all signals to minimize false positives while catching real laundering.
      </Callout>
    </div>
  );
}

// ═══════════════════════════════════════════
// SECTION 2: FEATURE ENGINEERING
// ═══════════════════════════════════════════
function Section2() {
  const [layer, setLayer] = useState(0);
  const layers = [
    {
      name: "Transaction-Level Features",
      color: C.blue,
      features: [
        { f: "amount", val: "$9,500", why: "Just below $10K CTR threshold — structuring signal" },
        { f: "time_of_day", val: "03:22 AM", why: "Off-hours activity is unusual for business accounts" },
        { f: "sender_country_risk", val: "0.82", why: "High-risk jurisdiction score from FATF greylist" },
        { f: "is_round_amount", val: "0", why: "Launderers often use exact round numbers" },
        { f: "days_since_account_open", val: "12", why: "Very new account — higher risk" },
        { f: "currency_conversion", val: "1", why: "Cross-currency adds layering complexity" },
      ],
    },
    {
      name: "Behavioral Features",
      color: C.accent,
      features: [
        { f: "tx_velocity_7d", val: "47", why: "47 transactions in 7 days vs. normal 3 — 15× spike" },
        { f: "avg_amount_deviation", val: "0.94", why: "Amounts cluster near threshold — not natural spending" },
        { f: "unique_counterparties_30d", val: "14", why: "Suddenly transacting with 14 new entities" },
        { f: "dormancy_break", val: "1", why: "Account was dormant for 6 months, now highly active" },
        { f: "amount_dispersion", val: "0.02", why: "All transactions nearly same amount — structuring" },
        { f: "time_pattern_entropy", val: "0.3", why: "Low entropy = transactions at predictable intervals" },
      ],
    },
    {
      name: "Graph/Network Features",
      color: C.purple,
      features: [
        { f: "counterparty_shared_UBO", val: "1", why: "Multiple recipients share same ultimate beneficial owner" },
        { f: "circular_flow_detected", val: "1", why: "Money returns to originator through intermediaries" },
        { f: "shell_company_score", val: "0.91", why: "Recipients flagged as likely shell entities" },
        { f: "network_hop_count", val: "4", why: "Money passes through 4 entities before destination" },
        { f: "sanctions_proximity", val: "2", why: "2 hops away from a sanctioned individual" },
        { f: "community_risk_score", val: "0.87", why: "The cluster this entity belongs to has high aggregate risk" },
      ],
    },
  ];

  return (
    <div>
      <Bridge from="Problem" to="Data" text="We know what we're detecting. Now: how do we convert raw banking data into features a neural network can process?" />

      <P>The first step in any ML pipeline is converting raw data into numbers. For AML, we extract features at <B>three levels</B> — each one captures patterns the others can't. Toggle between them:</P>

      <Tabs items={layers.map(l => l.name)} active={layer} onSelect={setLayer} />

      <div style={{ background: C.surface, borderRadius: 12, border: `1px solid ${C.border}`, overflow: "hidden" }}>
        <div style={{ padding: "12px 16px", background: layers[layer].color + "10", borderBottom: `1px solid ${C.border}` }}>
          <span style={{ fontFamily: mono, fontSize: 12, color: layers[layer].color, fontWeight: 600 }}>
            {layers[layer].name}
          </span>
        </div>
        {layers[layer].features.map((feat, i) => (
          <div key={i} style={{ display: "flex", gap: 12, padding: "12px 16px", borderBottom: i < layers[layer].features.length - 1 ? `1px solid ${C.border}` : "none", alignItems: "baseline" }}>
            <div style={{ fontFamily: mono, fontSize: 12, color: layers[layer].color, fontWeight: 600, minWidth: 180, flexShrink: 0 }}>{feat.f}</div>
            <div style={{ fontFamily: mono, fontSize: 12, color: C.text, minWidth: 60, flexShrink: 0 }}>{feat.val}</div>
            <div style={{ fontSize: 12, color: C.dim, lineHeight: 1.6 }}>{feat.why}</div>
          </div>
        ))}
      </div>

      <P style={{ marginTop: 18 }}>The final feature vector for one transaction is the <B>concatenation</B> of all three layers — typically 200–500 features. This is what the neural network sees.</P>

      <Callout icon="💡" title="Why Three Levels?" color={C.accent}>
        <B color={C.text}>Transaction features</B> catch individual red flags (like threshold structuring). <B color={C.text}>Behavioral features</B> catch temporal patterns (like velocity spikes). <B color={C.text}>Graph features</B> catch network-level schemes (like shell company webs). A launderer might evade any one layer — evading all three simultaneously is exponentially harder. This is how we reduce false positives.
      </Callout>

      <Callout icon="⚠️" title="The Feature Engineering Bottleneck" color={C.gold}>
        In traditional AML systems, analysts hand-craft these features and set manual thresholds ($10K, 30 days, etc.). This is brittle — launderers learn the thresholds. Our neural network will <B color={C.text}>learn the optimal thresholds and feature combinations from data</B> automatically.
      </Callout>
    </div>
  );
}

// ═══════════════════════════════════════════
// SECTION 3: TRANSACTION SCORING NN
// ═══════════════════════════════════════════
function Section3() {
  const [view, setView] = useState(0);

  return (
    <div>
      <Bridge from="Features" to="Scoring Model" text="We have a 200+ dimensional feature vector per transaction. Now we feed it into a neural network to produce a risk score." />

      <Tabs items={["Architecture", "Training Data", "Why It Beats Rules"]} active={view} onSelect={setView} />

      {view === 0 && (
        <div>
          <P>The transaction scoring model is a standard <B>multi-layer neural network</B>. It takes the feature vector as input, passes it through progressively narrower hidden layers, and outputs a single risk probability:</P>

          <svg viewBox="0 0 600 300" style={{ width: "100%", background: C.surface, borderRadius: 12, border: `1px solid ${C.border}`, marginBottom: 16 }}>
            {/* Input layer */}
            {Array.from({ length: 8 }).map((_, i) => {
              const y = 30 + (i / 7) * 240;
              return (
                <g key={`in-${i}`}>
                  <line x1={90} y1={y} x2={210} y2={70 + (i % 4) * 55} stroke={C.blue + "30"} strokeWidth="0.7" />
                  <line x1={90} y1={y} x2={210} y2={70 + ((i + 1) % 4) * 55} stroke={C.blue + "20"} strokeWidth="0.5" />
                  <circle cx={75} cy={y} r={12} fill={C.blue + "15"} stroke={C.blue + "50"} strokeWidth="1.5" />
                  <text x={75} y={y + 1} textAnchor="middle" dominantBaseline="middle" fill={C.blue} fontSize="7" fontFamily={mono}>x{i + 1}</text>
                </g>
              );
            })}
            <text x={28} y={20} fill={C.dim} fontSize="8" fontFamily={mono}>200+ features</text>
            <text x={75} y={290} textAnchor="middle" fill={C.dim} fontSize="8" fontFamily={mono}>Input</text>
            <text x={40} y={130} fill={C.dim} fontSize="7" fontFamily={mono}>amt, vel,</text>
            <text x={40} y={142} fill={C.dim} fontSize="7" fontFamily={mono}>graph, ...</text>

            {/* Hidden 1 */}
            {Array.from({ length: 4 }).map((_, i) => {
              const y = 70 + i * 55;
              return (
                <g key={`h1-${i}`}>
                  {Array.from({ length: 3 }).map((_, j) => (
                    <line key={`h1c-${j}`} x1={230} y1={y} x2={340} y2={90 + j * 55} stroke={C.accent + "25"} strokeWidth="0.7" />
                  ))}
                  <circle cx={220} cy={y} r={14} fill={C.accent + "12"} stroke={C.accent + "50"} strokeWidth="1.5" />
                  <text x={220} y={y + 1} textAnchor="middle" dominantBaseline="middle" fill={C.accent} fontSize="8" fontFamily={mono}>h{i + 1}</text>
                </g>
              );
            })}
            <text x={220} y={290} textAnchor="middle" fill={C.dim} fontSize="8" fontFamily={mono}>Hidden 1 (128)</text>
            <text x={220} y={40} textAnchor="middle" fill={C.accent} fontSize="7" fontFamily={mono}>threshold patterns</text>

            {/* Hidden 2 */}
            {Array.from({ length: 3 }).map((_, i) => {
              const y = 90 + i * 55;
              return (
                <g key={`h2-${i}`}>
                  <line x1={360} y1={y} x2={440} y2={125} stroke={C.purple + "25"} strokeWidth="0.7" />
                  <line x1={360} y1={y} x2={440} y2={175} stroke={C.purple + "25"} strokeWidth="0.7" />
                  <circle cx={350} cy={y} r={14} fill={C.purple + "12"} stroke={C.purple + "50"} strokeWidth="1.5" />
                  <text x={350} y={y + 1} textAnchor="middle" dominantBaseline="middle" fill={C.purple} fontSize="8" fontFamily={mono}>h{i + 5}</text>
                </g>
              );
            })}
            <text x={350} y={290} textAnchor="middle" fill={C.dim} fontSize="8" fontFamily={mono}>Hidden 2 (64)</text>
            <text x={350} y={52} textAnchor="middle" fill={C.purple} fontSize="7" fontFamily={mono}>typology combos</text>

            {/* Hidden 3 */}
            {[125, 175].map((y, i) => (
              <g key={`h3-${i}`}>
                <line x1={465} y1={y} x2={530} y2={150} stroke={C.gold + "30"} strokeWidth="1" />
                <circle cx={450} cy={y} r={14} fill={C.gold + "12"} stroke={C.gold + "50"} strokeWidth="1.5" />
                <text x={450} y={y + 1} textAnchor="middle" dominantBaseline="middle" fill={C.gold} fontSize="8" fontFamily={mono}>h{i + 8}</text>
              </g>
            ))}
            <text x={450} y={290} textAnchor="middle" fill={C.dim} fontSize="8" fontFamily={mono}>Hidden 3 (32)</text>
            <text x={450} y={95} textAnchor="middle" fill={C.gold} fontSize="7" fontFamily={mono}>risk abstraction</text>

            {/* Output */}
            <circle cx={545} cy={150} r={18} fill={C.red + "15"} stroke={C.red + "60"} strokeWidth="2" />
            <text x={545} y={146} textAnchor="middle" dominantBaseline="middle" fill={C.red} fontSize="8" fontFamily={mono} fontWeight="700">risk</text>
            <text x={545} y={158} textAnchor="middle" dominantBaseline="middle" fill={C.red} fontSize="7" fontFamily={mono}>score</text>
            <text x={545} y={290} textAnchor="middle" fill={C.dim} fontSize="8" fontFamily={mono}>Output</text>
            <text x={545} y={182} textAnchor="middle" fill={C.red} fontSize="9" fontFamily={mono} fontWeight="700">0.0 → 1.0</text>
          </svg>

          <div style={{ display: "grid", gap: 8 }}>
            {[
              { layer: "Hidden 1 (128 neurons)", learns: "Individual feature patterns — threshold proximity, velocity anomalies, jurisdiction risk combinations", color: C.accent },
              { layer: "Hidden 2 (64 neurons)", learns: "Typology combinations — 'structuring + new account + high-risk country' = elevated risk pattern", color: C.purple },
              { layer: "Hidden 3 (32 neurons)", learns: "Abstract risk profiles — 'this looks like trade-based laundering' vs. 'this looks like smurfing'", color: C.gold },
            ].map((item, i) => (
              <Card key={i} color={item.color} title={item.layer}>
                <B color={C.text}>Learns:</B> {item.learns}
              </Card>
            ))}
          </div>

          <Callout icon="🔗" title="Same Core Math, Applied to Finance" color={C.accent}>
            Every neuron does the same thing: <B color={C.text}>weighted sum → activation → next layer</B>. The math is identical across all neural networks. Backprop trains all weights via gradient descent. What changes between domains is the feature vector — here it's financial signals instead of text or images.
          </Callout>
        </div>
      )}

      {view === 1 && (
        <div>
          <P>The model needs labeled training data: transactions known to be suspicious or legitimate. This is one of AML's biggest challenges — here's how to build the dataset:</P>
          <div style={{ display: "grid", gap: 10, marginBottom: 16 }}>
            {[
              { source: "Filed SARs (Suspicious Activity Reports)", desc: "Historical SARs your compliance team filed — these are confirmed suspicious. Typically ~0.1–0.5% of total transactions.", label: "Positive (suspicious)", color: C.red },
              { source: "Regulatory enforcement actions", desc: "Cases where regulators confirmed laundering. Gold-standard labels but very rare.", label: "Positive (confirmed)", color: C.red },
              { source: "Closed investigations — cleared", desc: "Alerts that analysts investigated and marked as false positives. This is the bulk of your data.", label: "Negative (clean)", color: C.accent },
              { source: "Normal transaction population", desc: "Random sample from general transaction flow. Overwhelmingly clean, but may contain undetected laundering.", label: "Negative (assumed)", color: C.blue },
            ].map((item, i) => (
              <div key={i} style={{ display: "flex", gap: 14, padding: "14px 16px", background: C.card, borderRadius: 10, border: `1px solid ${item.color}20`, alignItems: "flex-start" }}>
                <div style={{ fontFamily: mono, fontSize: 10, color: item.color, fontWeight: 600, padding: "3px 8px", background: item.color + "15", borderRadius: 4, flexShrink: 0, whiteSpace: "nowrap" }}>{item.label}</div>
                <div>
                  <div style={{ fontSize: 13, color: C.text, fontWeight: 600, marginBottom: 2 }}>{item.source}</div>
                  <div style={{ fontSize: 12, color: C.dim, lineHeight: 1.6 }}>{item.desc}</div>
                </div>
              </div>
            ))}
          </div>
          <Callout icon="⚠️" title="Extreme Class Imbalance" color={C.gold}>
            Maybe 0.1% of transactions are suspicious — 99.9% are clean. You can't just train normally or the model learns "predict clean always" (99.9% accuracy, 0% useful). Solutions: <B color={C.text}>focal loss</B> (down-weight easy negatives), <B color={C.text}>SMOTE oversampling</B> of positives, and <B color={C.text}>stratified mini-batches</B> that ensure each batch has positive samples.
          </Callout>
        </div>
      )}

      {view === 2 && (
        <div>
          <P>Traditional AML uses hand-coded rules like "flag any transaction &gt; $9,000 from a new account." Here's why the neural network is better:</P>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
            {[
              { title: "Rules: Hard Thresholds", desc: "IF amount > $9,000 AND account_age < 30d → ALERT. Launderers learn the thresholds. Moving to $8,999 or splitting to 31 days evades it.", color: C.red, icon: "📏" },
              { title: "NN: Soft Boundaries", desc: "The network learns that $9,500 from a 12-day-old account with high velocity is riskier than $15,000 from a 5-year account. It learns continuous risk gradients.", color: C.accent, icon: "📈" },
              { title: "Rules: Feature Blindness", desc: "Each rule looks at 2–3 features. Misses multi-dimensional patterns where 5 features are each slightly unusual but collectively very suspicious.", color: C.red, icon: "👁️" },
              { title: "NN: Feature Interaction", desc: "Hidden layers automatically learn interactions: 'slightly high velocity × slightly unusual amount × new counterparties × dormancy break = very suspicious.'", color: C.accent, icon: "🔀" },
              { title: "Rules: Static", desc: "Require manual updates when laundering techniques evolve. Teams of analysts maintain hundreds of rules.", color: C.red, icon: "⏸️" },
              { title: "NN: Adaptive", desc: "Retrain quarterly on new SAR data. The model automatically learns new techniques as they appear in the labeled data.", color: C.accent, icon: "🔄" },
            ].map((item, i) => (
              <Card key={i} color={item.color} title={`${item.icon} ${item.title}`}>
                {item.desc}
              </Card>
            ))}
          </div>

          <Callout icon="📊" title="Impact on False Positives" color={C.accent}>
            Rule-based systems typically produce <B color={C.red}>95–98% false positives</B>. A well-trained neural network can bring this to <B color={C.accent}>60–75%</B> on its own — and we're not done yet. Adding graph analysis and RAG context brings it even lower.
          </Callout>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════
// SECTION 4: GRAPH NEURAL NETWORKS
// ═══════════════════════════════════════════
function Section4() {
  const [step, setStep] = useState(0);

  return (
    <div>
      <Bridge from="Transaction NN" to="Graph NN" text="The transaction NN scores individual transactions. But laundering is a NETWORK crime — we need to see the web of entities." />

                </div>
              </div>

          </div>
        </div>
      )}

      {phase === 1 && (
        <div>
          <P>The ensemble model combines all signals. Here's why this is powerful:</P>

          <Code>
            <span style={{ color: C.dim }}>{"// Inputs to the ensemble model:"}</span><br />
            <span style={{ color: C.blue }}>transaction_nn_score</span><span style={{ color: C.dim }}>{": 0.72"}</span><span style={{ color: C.dim }}>{"    // catches individual anomalies"}</span><br />
            <span style={{ color: C.purple }}>gnn_network_score</span><span style={{ color: C.dim }}>{":   0.88"}</span><span style={{ color: C.dim }}>{"    // catches network patterns"}</span><br />
            <span style={{ color: C.orange }}>rule_flag_count</span><span style={{ color: C.dim }}>{":     3"}</span><span style={{ color: C.dim }}>{"       // traditional rule hits"}</span><br />
            <span style={{ color: C.accent }}>gnn_embedding[0:32]</span><span style={{ color: C.dim }}>{":"}</span><span style={{ color: C.dim }}>{"        // raw graph features"}</span><br />
            <span style={{ color: C.gold }}>behavioral_features</span><span style={{ color: C.dim }}>{":"}</span><span style={{ color: C.dim }}>{"        // velocity, patterns"}</span><br /><br />
            <span style={{ color: C.dim }}>{"// The ensemble learns:"}</span><br />
            <span style={{ color: C.dim }}>{"// - When the NN says 0.5 but the GNN says 0.9"}</span><br />
            <span style={{ color: C.dim }}>{"//   → trust the GNN (it found network evidence)"}</span><br />
            <span style={{ color: C.dim }}>{"// - When the NN says 0.8 but GNN says 0.1"}</span><br />
            <span style={{ color: C.dim }}>{"//   → maybe just unusual business, not laundering"}</span><br />
            <span style={{ color: C.dim }}>{"// - When rules fire but both models say low risk"}</span><br />
            <span style={{ color: C.dim }}>{"//   → probably false positive from rigid rules"}</span>
          </Code>

          <Callout icon="🤔" title="Why Not Just Use The Best Single Model?" color={C.gold}>
            Because they catch <B color={C.text}>different types</B> of laundering. The transaction NN excels at behavioral anomalies but misses network schemes. The GNN excels at network patterns but may miss individual structuring. Rules catch known patterns but false-alarm on everything else. <B color={C.text}>The ensemble learns when to trust each signal.</B>
          </Callout>
        </div>
      )}

      {phase === 2 && (
        <div>
          <P>A critical final step: <B>calibrate</B> the ensemble's output so that a score of 0.90 actually means "90% chance of being truly suspicious." This requires:</P>

          <div style={{ display: "grid", gap: 10 }}>
            <Card color={C.accent} title="Platt Scaling">
              Fit a logistic regression on the ensemble's outputs vs. actual labels on a held-out validation set. This maps raw scores to true probabilities. Without calibration, the scores are just ordinal rankings — "higher is riskier" — but the actual numbers are meaningless.
            </Card>
            <Card color={C.gold} title="Dynamic Thresholds">
              Instead of one threshold for all alerts, set <B color={C.text}>tier-based thresholds</B>: Tier 1 (auto-file SAR): score &gt; 0.95 with graph evidence. Tier 2 (urgent review): 0.80–0.95. Tier 3 (batch review): 0.60–0.80. Below 0.60: suppress. This alone cuts false positives by 40–60% compared to a single threshold.
            </Card>
            <Card color={C.purple} title="Feedback Loop">
              When investigators close alerts as false positives or true positives, those labels feed back into the training data. The ensemble retrains quarterly, getting better each cycle. <B color={C.text}>This is how the system continuously improves.</B>
            </Card>
          </div>
        </div>
      )}
    </div>
  );
}

function DBox({ x, y, w, h, color, label, sub, icon, rx = 10, dashed = false }) {
  return (
    <g>
      <rect x={x} y={y} width={w} height={h} rx={rx} fill={color + "12"} stroke={color + "70"} strokeWidth="1.5" strokeDasharray={dashed ? "6,3" : "0"} />
      {icon && <text x={x + w / 2} y={y + (sub ? h / 2 - 6 : h / 2 - 2)} textAnchor="middle" dominantBaseline="middle" fontSize="14">{icon}</text>}
      <text x={x + w / 2} y={y + (icon ? h / 2 + 8 : h / 2 - (sub ? 4 : 0))} textAnchor="middle" dominantBaseline="middle" fill={color} fontSize="11" fontFamily={mono} fontWeight="600">{label}</text>
      {sub && <text x={x + w / 2} y={y + (icon ? h / 2 + 20 : h / 2 + 10)} textAnchor="middle" dominantBaseline="middle" fill={C.dim} fontSize="8" fontFamily={mono}>{sub}</text>}
    </g>
  );
}

function DArrow({ x1, y1, x2, y2, color = C.dim, label, dashed = false, labelSide = "above" }) {
  const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
  const a = Math.atan2(y2 - y1, x2 - x1);
  return (
    <g>
      <line x1={x1} y1={y1} x2={x2} y2={y2} stroke={color + "80"} strokeWidth="1.2" strokeDasharray={dashed ? "4,3" : "0"} />
      <polygon points={`${x2},${y2} ${x2 - 8 * Math.cos(a - 0.4)},${y2 - 8 * Math.sin(a - 0.4)} ${x2 - 8 * Math.cos(a + 0.4)},${y2 - 8 * Math.sin(a + 0.4)}`} fill={color + "80"} />
      {label && <text x={mx} y={my + (labelSide === "below" ? 12 : -6)} textAnchor="middle" fill={color} fontSize="7" fontFamily={mono} fontWeight="500">{label}</text>}
    </g>
  );
}

function DBoundary({ x, y, w, h, label, color = C.faint }) {
  return (
    <g>
      <rect x={x} y={y} width={w} height={h} rx={14} fill="none" stroke={color} strokeWidth="1.5" strokeDasharray="8,4" />
      <rect x={x + 12} y={y - 8} width={label.length * 5.8 + 16} height={16} rx={4} fill={C.bg} />
      <text x={x + 20} y={y + 1} fill={color} fontSize="9" fontFamily={mono} fontWeight="600">{label}</text>
    </g>
  );
}

      <div style={{ maxWidth: 760, margin: "0 auto", padding: "28px 20px 60px" }}>
        <div style={{ marginBottom: 24 }}>
          <div style={{ fontFamily: mono, fontSize: 10, color: C.accent, textTransform: "uppercase", letterSpacing: 3, marginBottom: 6 }}>System Design Deep Dive</div>
          <h1 style={{ fontSize: 24, fontWeight: 700, margin: 0, lineHeight: 1.3 }}>AML Detection System: NN + Graph RAG + RAG</h1>
          <p style={{ color: C.dim, margin: "6px 0 0", fontSize: 14 }}>From transaction features to ensemble scoring with minimal false positives</p>
        </div>

        <div style={{ display: "flex", gap: 3, marginBottom: 8 }}>
          {SECTIONS.map((_, i) => (<div key={i} style={{ flex: 1, height: 3, borderRadius: 2, background: i <= active ? C.accent : C.faint, transition: "background 0.3s", cursor: "pointer" }} onClick={() => setActive(i)} />))}
        </div>

        <div style={{ display: "flex", gap: 4, marginBottom: 24, flexWrap: "wrap" }}>
          {SECTIONS.map((s, i) => (
            <button key={s.id} onClick={() => setActive(i)} style={{
              background: active === i ? C.accent : "transparent",
              color: active === i ? C.bg : C.dim,
              border: `1px solid ${active === i ? C.accent : C.border}`,
              borderRadius: 16, padding: "5px 11px", cursor: "pointer",
              fontFamily: mono, fontSize: 10, fontWeight: active === i ? 700 : 400,
              transition: "all 0.15s", whiteSpace: "nowrap",
            }}>{s.id}. {s.title}</button>
          ))}
        </div>

        <div style={{ marginBottom: 20 }}>
          <h2 style={{ fontSize: 22, fontWeight: 700, margin: 0 }}>{SECTIONS[active].title}</h2>
          <div style={{ fontFamily: mono, fontSize: 12, color: C.accent, marginTop: 4 }}>{SECTIONS[active].sub}</div>
        </div>

        <Comp />

        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 32, paddingTop: 20, borderTop: `1px solid ${C.border}` }}>
          <button onClick={() => setActive(Math.max(0, active - 1))} disabled={active === 0} style={{ background: "transparent", color: active === 0 ? C.faint : C.dim, border: `1px solid ${active === 0 ? C.faint : C.border}`, borderRadius: 8, padding: "10px 20px", cursor: active === 0 ? "default" : "pointer", fontFamily: mono, fontSize: 12 }}>← Previous</button>
          <span style={{ fontFamily: mono, fontSize: 12, color: C.dim, alignSelf: "center" }}>{active + 1} / {SECTIONS.length}</span>
          <button onClick={() => setActive(Math.min(SECTIONS.length - 1, active + 1))} disabled={active === SECTIONS.length - 1} style={{ background: active === SECTIONS.length - 1 ? C.faint : C.accent, color: active === SECTIONS.length - 1 ? C.dim : C.bg, border: "none", borderRadius: 8, padding: "10px 20px", cursor: active === SECTIONS.length - 1 ? "default" : "pointer", fontFamily: mono, fontSize: 12, fontWeight: 700 }}>Next →</button>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));

</script>
</body>
</html>
